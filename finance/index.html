<!-- Cloud Sync — async, non-blocking -->
<script>
var _financeCloudEP='/api/data/finance%3Adefault';
var _financeCloudReady=false;
// Global save indicator store (used by React <SaveIndicator/>)
window._vdbSaveStore={pending:false,lastAt:null,lastErr:null,listeners:[],
  sub:function(fn){this.listeners.push(fn);return()=>{this.listeners=this.listeners.filter(f=>f!==fn)}},
  emit:function(){this.listeners.forEach(f=>f(this))},
  start:function(){this.pending=true;this.lastErr=null;this.emit()},
  done:function(err){this.pending=false;if(err)this.lastErr=err;else this.lastAt=Date.now();this.emit()}};
// Keys that must NEVER be synced to cloud (device-local only)
window._vdbLocalOnly=['vdb_theme'];
(function(){
  var PREFIX='vdb_';
  var _o=localStorage.setItem.bind(localStorage),_t=null;
  localStorage.setItem=function(k,v){_o(k,v);
    if(_financeCloudReady&&typeof k==='string'&&k.indexOf(PREFIX)===0&&window._vdbLocalOnly.indexOf(k)===-1){
      clearTimeout(_t);_t=setTimeout(function(){
        var snap={};
        for(var i=0;i<localStorage.length;i++){
          var key=localStorage.key(i);
          if(key.indexOf(PREFIX)===0&&window._vdbLocalOnly.indexOf(key)===-1){
            try{snap[key]=JSON.parse(localStorage.getItem(key))}
            catch(e){snap[key]=localStorage.getItem(key)}
          }
        }
        window._vdbSaveStore.start();
        fetch(_financeCloudEP,{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify(snap)}).then(function(r){
            if(!r.ok){window._vdbSaveStore.done('HTTP '+r.status);console.warn('[cloud] sync failed',r.status)}
            else window._vdbSaveStore.done(null);
          }).catch(function(e){window._vdbSaveStore.done(String(e));console.warn('[cloud] sync error',e)});
      },800);
    }
  };
})();
</script>

if(typeof document!=='undefined'){document.addEventListener('focusin',e=>{if(e.target?.type==='number')setTimeout(()=>e.target.select(),0)})}

// === useLocalData: localStorage replacement for Firebase ===
function useLocalData(key,def){
  const[d,sD]=useState(()=>{
    try{const s=localStorage.getItem(STORAGE_PREFIX+key);return s!==null?JSON.parse(s):def}
    catch(e){return def}
  });
  const save=useCallback(v=>{
    sD(v);
    try{localStorage.setItem(STORAGE_PREFIX+key,JSON.stringify(v))}
    catch(e){if(e.name==='QuotaExceededError'){if(typeof toast!=='undefined')toast.err('Almacenamiento lleno. Haz un Backup y borra datos antiguos.');else console.error('Quota exceeded')}else console.error("Error guardando "+key+":",e)}
  },[key]);
  return[d,save];
}

// === useTheme: persisted in localStorage (NOT synced to cloud) ===
function useTheme(){
  const[theme,setT]=useState(()=>{try{return localStorage.getItem("vdb_theme")||"light"}catch(e){return"light"}});
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);try{localStorage.setItem("vdb_theme",theme)}catch(e){}},[theme]);
  return[theme,()=>setT(t=>t==="dark"?"light":"dark")];
}

// === Ni: numeric input with pl-PL formatting ===
function Ni({value,onChange,placeholder,dec=0,allowNeg=true,min,max,style,...rest}){
  const[focus,setFocus]=useState(false);
  const[raw,setRaw]=useState("");
  const num=value==null||value===""?null:Number(value);
  const outOfRange=num!=null&&((min!=null&&num<min)||(max!=null&&num>max));
  const display=focus?raw:(num==null||isNaN(num)?"":num.toLocaleString("pl-PL",{minimumFractionDigits:dec,maximumFractionDigits:Math.max(dec,2)}));
  const onFocus=e=>{setFocus(true);setRaw(num==null||isNaN(num)?"":String(num).replace(".",","));setTimeout(()=>e.target.select(),0)};
  const onBlur=()=>setFocus(false);
  const onCh=e=>{const s=e.target.value;setRaw(s);const cleaned=s.replace(/\s/g,"").replace(/\./g,"").replace(",",".");const allowed=allowNeg?/^-?\d*\.?\d*$/:/^\d*\.?\d*$/;if(cleaned===""||cleaned==="-"){onChange({target:{value:""}});return}if(!allowed.test(cleaned))return;onChange({target:{value:cleaned}})};
  return<input type="text" inputMode="decimal" value={display} placeholder={placeholder} onChange={onCh} onFocus={onFocus} onBlur={onBlur} title={outOfRange?`Fuera de rango ${min??"-∞"}..${max??"+∞"}`:undefined} style={{...(style||{}),...(outOfRange?{borderColor:C.rd}:{})}} {...rest}/>;
}

// === Toast system ===
const toastStore={items:[],listeners:[],
  sub(fn){this.listeners.push(fn);return()=>{this.listeners=this.listeners.filter(f=>f!==fn)}},
  emit(){this.listeners.forEach(f=>f([...this.items]))},
  push(t){const id=Date.now()+Math.random();this.items.push({...t,id});this.emit();if(t.duration!==0)setTimeout(()=>this.remove(id),t.duration||4000);return id},
  remove(id){this.items=this.items.filter(i=>i.id!==id);this.emit()}};
const toast={
  ok:(msg,opts)=>toastStore.push({kind:"ok",msg,...opts}),
  err:(msg,opts)=>toastStore.push({kind:"err",msg,duration:6000,...opts}),
  info:(msg,opts)=>toastStore.push({kind:"info",msg,...opts}),
  undoable:(msg,onUndo,opts={})=>toastStore.push({kind:"info",msg,duration:opts.duration||7000,action:{label:opts.label||"Deshacer",fn:onUndo}})
};
function Toasts(){
  const[items,setItems]=useState([]);
  useEffect(()=>toastStore.sub(setItems),[]);
  return<div className="vdb-toasts">{items.map(t=><div key={t.id} className={"vdb-toast "+t.kind}>
    <span style={{flex:1}}>{t.msg}</span>
    {t.action&&<button onClick={()=>{t.action.fn();toastStore.remove(t.id)}}>{t.action.label}</button>}
    <button onClick={()=>toastStore.remove(t.id)} title="Cerrar" style={{opacity:0.5}}>✕</button>
  </div>)}</div>;
}

// === SaveIndicator ===
function useSaveStatus(){
  const[s,setS]=useState({pending:window._vdbSaveStore.pending,lastAt:window._vdbSaveStore.lastAt,lastErr:window._vdbSaveStore.lastErr});
  useEffect(()=>window._vdbSaveStore.sub(st=>setS({pending:st.pending,lastAt:st.lastAt,lastErr:st.lastErr})),[]);
  return s;
}
function SaveIndicator(){
  const s=useSaveStatus();
  const[,force]=useState(0);
  useEffect(()=>{const t=setInterval(()=>force(v=>v+1),30000);return()=>clearInterval(t)},[]);
  const relative=(t)=>{if(!t)return"";const d=Math.floor((Date.now()-t)/1000);if(d<5)return"ahora";if(d<60)return`hace ${d}s`;if(d<3600)return`hace ${Math.floor(d/60)}m`;return`hace ${Math.floor(d/3600)}h`};
  if(s.lastErr)return<span style={{fontSize:10,color:C.rd,display:"flex",alignItems:"center",gap:5}} title={s.lastErr}><span>●</span>Error al guardar</span>;
  if(s.pending)return<span style={{fontSize:10,color:C.am,display:"flex",alignItems:"center",gap:5}}><span>●</span>Guardando…</span>;
  if(s.lastAt)return<span style={{fontSize:10,color:C.gn,display:"flex",alignItems:"center",gap:5}}><span>●</span>Guardado {relative(s.lastAt)}</span>;
  return<span style={{fontSize:10,color:C.tm,display:"flex",alignItems:"center",gap:5}}><span>●</span>Cloud</span>;
}

// === ErrorBoundary ===
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null}}
  static getDerivedStateFromError(err){return{err}}
  componentDidCatch(err,info){console.error("[ErrorBoundary]",err,info)}
  reset(){this.setState({err:null})}
  render(){if(!this.state.err)return this.props.children;
    return<div style={{minHeight:"100vh",padding:40,display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div style={{maxWidth:520,padding:28,background:C.sf,borderRadius:14,border:`1px solid ${C.rd}`,boxShadow:"0 6px 24px rgba(0,0,0,.1)"}}>
        <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
        <h2 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Algo se rompió</h2>
        <p style={{fontSize:13,color:C.td,marginBottom:14,lineHeight:1.6}}>Ha ocurrido un error y el módulo no pudo renderizarse. Tus datos están a salvo.</p>
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <button onClick={()=>this.reset()} style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.ac,color:C.w,fontWeight:600,cursor:"pointer"}}>Reintentar</button>
          <button onClick={()=>location.reload()} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${C.bd}`,background:"transparent",cursor:"pointer"}}>Recargar</button>
        </div>
        <details style={{fontSize:11,color:C.tm}}><summary style={{cursor:"pointer"}}>Detalle técnico</summary><pre style={{marginTop:8,padding:10,background:C.sa,borderRadius:6,overflowX:"auto",fontSize:10}}>{String(this.state.err?.stack||this.state.err)}</pre></details>
      </div>
    </div>}
}

function Onboarding({onFinish}){
  const[step,setStep]=useState(0);
  const[data,setData]=useState({income:0,rent:0,savings:0});
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.key==="Enter"){e.preventDefault();if(step<4)setStep(s=>s+1);else onFinish(data)}
      else if(e.key==="Escape"&&step>0){e.preventDefault();setStep(s=>s-1)}
    };
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[step,data,onFinish]);
  const steps=[
    {title:"¡Bienvenido a VDB Finance! 🎉",desc:"En 30 segundos configuramos tu perfil. Si ya tienes datos, puedes saltar esto y usar Importar Excel desde el dashboard.",field:null},
    {title:"¿Cuánto cobras al mes? 💰",desc:"Tu nómina neta mensual.",field:"income",label:"Nómina mensual neta (zł)"},
    {title:"¿Cuánto pagas de alquiler/hipoteca? 🏠",desc:"Tu gasto fijo más grande. Si no tienes, pon 0.",field:"rent",label:"Alquiler o hipoteca (zł/mes)"},
    {title:"¿Cuánto tienes ahorrado? 🏦",desc:"Una estimación vale.",field:"savings",label:"Ahorro total aproximado (zł)"},
    {title:"¡Todo listo! 🚀",desc:"Ya tienes lo básico. Desde el dashboard puedes importar un Excel completo si quieres rellenarlo todo de golpe.",field:null},
  ];
  const s=steps[step];
  return<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
    <div style={{width:"95%",maxWidth:440,background:C.w,borderRadius:20,padding:"24px 20px",boxShadow:"0 20px 60px rgba(0,0,0,.15)",animation:"fadeIn .4s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{display:"flex",gap:4}}>{steps.map((_,i)=><div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i<=step?C.ac:C.bd,transition:"all .3s"}}/>)}</div>
        <button onClick={()=>onFinish({income:0,rent:0,savings:0})} style={{background:"none",border:"none",fontSize:11,color:C.tm,cursor:"pointer"}}>Saltar →</button>
      </div>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{s.title}</h2>
      <p style={{fontSize:13,color:C.td,lineHeight:1.6,marginBottom:20}}>{s.desc}</p>
      {s.field&&<div style={{marginBottom:20}}>
        <Lb>{s.label}</Lb>
        <input type="number" value={data[s.field]||""} onChange={e=>setData({...data,[s.field]:Number(e.target.value)||0})} style={{fontSize:16,padding:"12px 14px",fontWeight:600}}/>
      </div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        {step>0&&<Bt onClick={()=>setStep(step-1)}>← Atrás</Bt>}
        {step<steps.length-1?<PB onClick={()=>setStep(step+1)}>Siguiente →</PB>
        :<PB onClick={()=>onFinish(data)}>Empezar 🚀</PB>}
      </div>
    </div>
  </div>;
}

const DualChart=({data,rates,goal,labels,width=620,height=180})=>{
  if(!data||!data.length)return null;
  const mx=Math.max(...data.map(Math.abs),1);const pad=35;const rPad=40;const bW=(width-pad-rPad)/data.length-3;const mid=height/2;
  return<svg viewBox={`0 0 ${width} ${height}`} style={{display:"block",width:"100%",height:"auto"}}>
    {data.map((v,i)=>{const h=Math.max((Math.abs(v)/mx)*(mid-18),2);const y=v>=0?mid-h:mid;
      return<g key={i}><rect x={pad+i*(bW+3)} y={y} width={bW} height={h} rx={3} fill={v>=0?C.gn:C.rd} opacity={.65}/>
        <text x={pad+i*(bW+3)+bW/2} y={height-3} textAnchor="middle" fill={C.tm} fontSize={10}>{labels?.[i]}</text>
        <text x={pad+i*(bW+3)+bW/2} y={v>=0?y-4:y+h+10} textAnchor="middle" fill={v>=0?C.gn:C.rd} fontSize={9} {...mn}>{fmt(v)}</text></g>})}
    <line x1={pad} y1={mid} x2={width-rPad} y2={mid} stroke={C.bd} strokeWidth={1}/>
    {goal>0&&<><line x1={pad} y1={mid-(goal/mx)*(mid-18)} x2={width-rPad} y2={mid-(goal/mx)*(mid-18)} stroke={C.am} strokeWidth={1} strokeDasharray="4 3"/>
      <text x={width-rPad+4} y={mid-(goal/mx)*(mid-18)+4} fill={C.am} fontSize={8} {...mn}>{fmt(goal)}zł</text></>}
    {rates&&rates.length>0&&<>{rates.map((r,i)=>{
      const x=pad+i*(bW+3)+bW/2;const y2=mid-(Math.min(Math.max(r,-1),1))*(mid-18);
      const nx=i<rates.length-1?pad+(i+1)*(bW+3)+bW/2:x;const ny=i<rates.length-1?mid-(Math.min(Math.max(rates[i+1],-1),1))*(mid-18):y2;
      return<g key={"r"+i}>{i<rates.length-1&&<line x1={x} y1={y2} x2={nx} y2={ny} stroke={C.bl} strokeWidth={2} opacity={.7}/>}
        <circle cx={x} cy={y2} r={3} fill={C.w} stroke={C.bl} strokeWidth={2}/>
        <text x={x} y={y2-8} textAnchor="middle" fill={C.bl} fontSize={8} {...mn}>{(r*100).toFixed(0)}%</text></g>})}</>}
  </svg>;
};

// === Patrimonio: sliding window of years ===
// Storage index 0 is anchored to PAT_START_YEAR (2023) and never shifts.
// The visible window slides so the current year stays inside.
const PAT_START_YEAR=2023;
const PAT_WINDOW=10;
const getPatYears=()=>{
  const CY=new Date().getFullYear();
  const end=CY+2;
  const start=Math.max(PAT_START_YEAR,end-PAT_WINDOW+1);
  return Array.from({length:PAT_WINDOW},(_,i)=>start+i);
};
const PAT_YEARS=getPatYears();
const yearToIdx=(year)=>year-PAT_START_YEAR;
const ensureValuesLength=(arr,len)=>arr.map(item=>{
  const values=item.values||[];
  if(values.length>=len)return item;
  return{...item,values:[...values,...Array(len-values.length).fill(0)]};
});

async function importFromExcel(file){
if(file.size>5*1024*1024)throw new Error("Archivo demasiado grande (max 5MB)");
  const data=await file.arrayBuffer();const wb=XLSX.read(data);
  const set=(key,val)=>localStorage.setItem(STORAGE_PREFIX+key,JSON.stringify(val));
  const readSheet=(name)=>{const sh=wb.Sheets[name];if(!sh)return[];return XLSX.utils.sheet_to_json(sh,{header:1,defval:null}).filter(r=>r&&r.length>0&&r[0]!=null&&r[0]!=="")};
  const summary=[];
  // Ingresos (retrocompatible: detecta si la col D es "Base" o ya es Ene)
  const incData=readSheet("Ingresos");
  if(incData.length>1){
    const incHdr=incData[0]||[];
    const hasIncBase=String(incHdr[3]||"").trim().toLowerCase()==="base";
    const incMonthStart=hasIncBase?4:3;
    const incHist={};const incMaster=[];const seen=new Set();
    incData.slice(1).forEach(row=>{
      const year=Number(row[0]);const name=String(row[1]||"").trim();const type=String(row[2]||"Otros").trim();
      if(!year||!name)return;
      const base=hasIncBase&&row[3]!=null&&row[3]!==""?(Number(row[3])||null):null;
      const amounts=MO.map((_,i)=>{const v=row[incMonthStart+i];return v!=null&&v!==""?(Number(v)||0):null});
      if(!incHist[year])incHist[year]=[];
      incHist[year].push({name,type,base,amounts});
      const k=name+"|"+type;if(!seen.has(k)){seen.add(k);incMaster.push({name,type})}
    });
    if(Object.keys(incHist).length>0){set("incomeHistory",incHist);set("incRows",incMaster);summary.push("Ingresos: "+Object.values(incHist).reduce((s,a)=>s+a.length,0)+" filas")}
  }
  // Gastos Mensuales
  const meData=readSheet("Gastos Mensuales");
  if(meData.length>1){
    const meHist={};const meMaster=[];const seen=new Set();
    meData.slice(1).forEach(row=>{
      const year=Number(row[0]);const name=String(row[1]||"").trim();const type=String(row[2]||"Otros").trim();
      if(!year||!name)return;
      const monthly=Number(row[3])||0;
      const real=MO.map((_,i)=>{const v=row[4+i];return v!=null&&v!==""?Number(v)||0:null});
      if(!meHist[year])meHist[year]=[];
      meHist[year].push({name,type,monthly,real});
      const k=name+"|"+type;if(!seen.has(k)){seen.add(k);meMaster.push({name,type})}
    });
    if(Object.keys(meHist).length>0){set("meHistory",meHist);set("meRows",meMaster);summary.push("Gastos Mensuales: "+Object.values(meHist).reduce((s,a)=>s+a.length,0)+" filas")}
  }
  // Gastos Anuales
  const aeData=readSheet("Gastos Anuales");
  if(aeData.length>1){
    const aeHist={};const aeMaster=[];const seen=new Set();
    aeData.slice(1).forEach(row=>{
      const year=Number(row[0]);const name=String(row[1]||"").trim();const type=String(row[2]||"Otros").trim();
      if(!year||!name)return;
      const annual=Number(row[3])||0;
      const aeReal=MO.map((_,i)=>{const v=row[4+i];return v!=null&&v!==""?Number(v)||0:null});
      if(!aeHist[year])aeHist[year]=[];
      aeHist[year].push({name,type,annual,real:aeReal});
      const k=name+"|"+type;if(!seen.has(k)){seen.add(k);aeMaster.push({name,type})}
    });
    if(Object.keys(aeHist).length>0){set("aeHistory",aeHist);set("aeRows",aeMaster);summary.push("Gastos Anuales: "+Object.values(aeHist).reduce((s,a)=>s+a.length,0)+" filas")}
  }
  // Histórico Patrimonio
  const fhData=readSheet("Historico Patrimonio");
  if(fhData.length>1){
    const finHist=fhData.slice(1).map(row=>({year:Number(row[0])||0,income:Number(row[1])||0,expense:Number(row[2])||0})).filter(h=>h.year>0);
    if(finHist.length>0){set("finHistory",finHist);summary.push("Histórico Patrimonio: "+finHist.length+" años")}
  }
  // Activos
  const asData=readSheet("Activos");
  if(asData.length>1){
    const assets=asData.slice(1).map(row=>({name:String(row[0]||"").trim(),type:String(row[1]||"efectivo").trim(),values:Array.from({length:10},(_,i)=>Number(row[2+i])||0)})).filter(a=>a.name);
    if(assets.length>0){set("assets",assets);summary.push("Activos: "+assets.length)}
  }
  // Deudas
  const dbData=readSheet("Deudas");
  if(dbData.length>1){
    const debts=dbData.slice(1).map(row=>({name:String(row[0]||"").trim(),values:Array.from({length:10},(_,i)=>Number(row[1+i])||0)})).filter(d=>d.name&&d.name!=="(ejemplo)");
    if(debts.length>0){set("debts",debts);summary.push("Deudas: "+debts.length)}
  }
  // Config sheets
  const readConfig=(sheetName,mapping)=>{
    const data=readSheet(sheetName);if(data.length<2)return 0;let count=0;
    data.slice(1).forEach(row=>{
      const key=String(row[0]||"").trim();const val=row[1];
      if(mapping[key]&&val!=null&&val!==""){
        const target=mapping[key];let pv;
        if(target.type==="bool"){const sv=String(val).toLowerCase();pv=sv==="si"||sv==="sí"||sv==="true"||sv==="1"||val===true||val===1}
        else{pv=Number(val);if(isNaN(pv))return}
        set(target.key,pv);count++;
      }
    });
    return count;
  };
  if(readConfig("Hipoteca",{precio_vivienda:{key:"hPP"},entrada_pct:{key:"hDP"},tin_pct:{key:"hT"},plazo_anios:{key:"hY"},cuota_min:{key:"hMn"},cuota_max:{key:"hMx"}}))summary.push("Hipoteca");
  if(readConfig("Jubilacion MC",{edad_actual:{key:"mcAge"},edad_jubilacion:{key:"mcRetAge"},esperanza_vida:{key:"mcLifeExp"},patrimonio_inicial:{key:"mcInitP"},aportacion_mensual:{key:"mcContr"},retirada_mensual:{key:"mcWith"},rendimiento_medio_pct:{key:"mcMeanR"},volatilidad_pct:{key:"mcVol"},ajustar_inflacion:{key:"mcInf",type:"bool"},inflacion_pct:{key:"mcInfR"}}))summary.push("Jubilación MC");
  if(readConfig("Planificador",{edad_actual:{key:"m7Age"},edad_jubilacion:{key:"m7RetAge"},esperanza_vida:{key:"m7LifeExp"},patrimonio_actual:{key:"m7Pat"},acumulacion_anual:{key:"m7Accum"},gasto_mensual_jubilacion:{key:"m7Need"},rendimiento_jubilacion_pct:{key:"m7RetReturn"},ajustar_inflacion:{key:"m7Inf",type:"bool"},inflacion_pct:{key:"m7InfR"}}))summary.push("Planificador");
  if(readConfig("Otros",{objetivo_ahorro_mensual:{key:"savingsGoal"},mc_excluir_iliquidos:{key:"mcExclIliq",type:"bool"}}))summary.push("Otros");
  if(readConfig("Libertad Financiera",{ingreso_anual:{key:"gI"},gasto_anual:{key:"gE"},patrimonio_inicial:{key:"gP"},rendimiento_pct:{key:"gR"}}))summary.push("Libertad Financiera");
  // Categorias de gasto (custom)
  const ctData=readSheet("Categorias");
  if(ctData.length>1){
    const types=ctData.slice(1).map(row=>{const name=String(row[0]||"").trim();const fijoStr=String(row[1]||"").toLowerCase();return name?{name,isFijo:fijoStr==="si"||fijoStr==="sí"||fijoStr==="true"||fijoStr==="1"}:null}).filter(Boolean);
    if(types.length>0){set("expTypes",types);summary.push("Categorías: "+types.length)}
  }
  // Crecimiento Proyectado por año (M2)
  const pgData=readSheet("Crecimiento Proyectado");
  if(pgData.length>1){
    const map={};pgData.slice(1).forEach(row=>{const y=Number(row[0]);const v=Number(row[1]);if(y>0&&!isNaN(v))map[y]=v});
    const arr=PAT_YEARS.map(y=>({pct:map[y]!=null?map[y]:5}));
    set("projGrowth",arr);summary.push("Crecimiento proyectado");
  }
  // Eventos Jubilacion (M6)
  const evData=readSheet("Eventos Jubilacion");
  if(evData.length>1){
    const events=evData.slice(1).map(row=>{const n=String(row[0]||"").trim();const a=Number(row[1])||0;const am=Number(row[2])||0;return n?{name:n,age:a,amount:am}:null}).filter(Boolean);
    if(events.length>0){set("mcEvents",events);summary.push("Eventos jubilación: "+events.length)}
  }
  // Objetivo Ahorro Anual (sgHistory)
  const sgData=readSheet("Objetivo Ahorro Anual");
  if(sgData.length>1){
    const map={};sgData.slice(1).forEach(row=>{const y=Number(row[0]);const v=Number(row[1]);if(y>0&&!isNaN(v))map[y]=v});
    if(Object.keys(map).length>0){set("sgHistory",map);summary.push("Objetivos ahorro: "+Object.keys(map).length+" años")}
  }
  set("onboarded",true);
  return summary;
}

async function importFromJSON(file){
  if(file.size>5*1024*1024)throw new Error("Archivo demasiado grande (max 5MB)");
  const text=await file.text();const j=JSON.parse(text);
  const set=(key,val)=>localStorage.setItem(STORAGE_PREFIX+key,JSON.stringify(val));
  const curYrIdx=Math.max(0,Math.min(9,new Date().getFullYear()-2023));
  const summary=[];
  const oldAssets=JSON.parse(localStorage.getItem(STORAGE_PREFIX+"assets")||"null")||D_AS;
  const oldDebts=JSON.parse(localStorage.getItem(STORAGE_PREFIX+"debts")||"null")||D_DB;
  const newAssets=[...oldAssets.map(a=>({...a,values:[...a.values]}))];
  const newDebts=[...oldDebts.map(d=>({...d,values:[...d.values]}))];
  const findOrAdd=(arr,name,type)=>{let r=arr.find(a=>a.name.toLowerCase()===name.toLowerCase());if(!r){r={name,type:type||"efectivo",values:Array(10).fill(0)};arr.push(r)}return r};
  const findOrAddDebt=(arr,name)=>{let r=arr.find(d=>d.name.toLowerCase()===name.toLowerCase());if(!r){r={name,values:Array(10).fill(0)};arr.push(r)}return r};
  const al=j.activos_liquidos||{};const ai=j.activos_inversion_no_duplicar_con_liquido||{};const aim=j.activos_inmobiliarios||{};const pas=j.pasivos||{};
  let count=0;
  if(al.efectivo_ing_total!=null){findOrAdd(newAssets,"Efectivo ING","efectivo").values[curYrIdx]=Number(al.efectivo_ing_total)||0;count++}
  if(al.revolut_externa!=null){findOrAdd(newAssets,"Revolut","efectivo").values[curYrIdx]=Number(al.revolut_externa)||0;count++}
  if(al.ib_total!=null){findOrAdd(newAssets,"Interactive Brokers","inversión").values[curYrIdx]=Number(al.ib_total)||0;count++}
  if(al.efectivo_ib_pln!=null&&al.ib_total==null){findOrAdd(newAssets,"Interactive Brokers","inversión").values[curYrIdx]=Number(al.efectivo_ib_pln)||0;count++}
  if(ai.ppk_orona!=null){findOrAdd(newAssets,"PPK Orona","inversión").values[curYrIdx]=Number(ai.ppk_orona)||0;count++}
  if(aim){Object.entries(aim).forEach(([k,v])=>{if(v&&typeof v==="object"&&v.valor_mercado_estimado!=null){const name=k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());findOrAdd(newAssets,name,"inversión").values[curYrIdx]=Number(v.valor_mercado_estimado)||0;count++}
    else if(v&&typeof v==="object"&&v.valor_compra!=null){const name=k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());findOrAdd(newAssets,name,"inversión").values[curYrIdx]=Number(v.valor_compra)||0;count++}})}
  if(pas.hipoteca_ing!=null){findOrAddDebt(newDebts,"Hipoteca ING").values[curYrIdx]=Math.abs(Number(pas.hipoteca_ing)||0);count++}
  if(pas.prestamo_alior_tv!=null){findOrAddDebt(newDebts,"Préstamo Alior").values[curYrIdx]=Math.abs(Number(pas.prestamo_alior_tv)||0);count++}
  Object.entries(pas).forEach(([k,v])=>{if(k==="hipoteca_ing"||k==="prestamo_alior_tv")return;if(v!=null&&typeof v==="number"){findOrAddDebt(newDebts,k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase())).values[curYrIdx]=Math.abs(v);count++}});
  if(count>0){set("assets",newAssets);set("debts",newDebts);summary.push(`${count} campos de patrimonio actualizados para ${2023+curYrIdx}`)}
  if(j.patrimonio_neto_estimado_pln!=null){summary.push(`Patrimonio Neto verificado: ${Number(j.patrimonio_neto_estimado_pln).toLocaleString("pl-PL")} zł`)}
  set("onboarded",true);
  return summary;
}

function wipeAllData(){
  if(!confirm("¿BORRAR TODOS tus datos? Esta acción NO se puede deshacer."))return;
  if(!confirm("Última oportunidad. Pulsa OK SOLO si tienes una copia de seguridad. ¿Borrar definitivamente?"))return;
  Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// === FinancialReading: diagnóstico narrativo del dashboard ===
function FinancialReading(p){
  const{patNow,patDelta,patDeltaPct,tIY,tEY,rY,sr,avgMonthlySavings,tMeY,tAeY,gastosFijos,liquidAssets,runway,monthlyExpTotal,selYear,m7Age,m7RetAge,m7Need,m7Accum,m7RetReturn}=p;
  // --- Overall health score 0-7 ---
  let score=0;
  if(patNow>0)score+=2;else if(patNow<0)score-=1;
  if(sr>=0.2)score+=2;else if(sr>0)score+=1;
  if(runway>=12)score+=2;else if(runway>=6)score+=1;
  if(patDelta>0)score+=1;
  const overall=score>=6?{l:"💪 Excelente",c:C.gn,bg:C.gd,msg:"Tu situación financiera es sólida. Ahorras bien, tienes colchón, y tu patrimonio crece. El trabajo ahora es optimizar: cada punto de ahorro extra acelera tu libertad financiera."}
    :score>=4?{l:"✅ Buena",c:C.gn,bg:C.gd,msg:"Vas bien, con márgenes sanos. Tienes áreas concretas que pulir — mira abajo dónde enfocar para pasar de bien a excelente."}
    :score>=2?{l:"⚠️ Mejorable",c:C.am,bg:C.amd,msg:"Estable pero frágil. Hay uno o dos puntos clave que si no los arreglas acabarán doliendo. Foco en lo que indico abajo antes de pensar en inversión o expansión."}
    :{l:"🚨 Crítica",c:C.rd,bg:C.rdd,msg:"Gastas más de lo que ingresas o no tienes colchón. Prioridad absoluta: cerrar el desangre y construir fondo de emergencia. Nada más importa hasta que estabilices la base."};
  // --- Strengths ---
  const strengths=[];
  if(sr>=0.3)strengths.push({t:"Tasa de ahorro excepcional",d:`Ahorras ${fP(sr)} de tus ingresos, por encima del 30%. Si mantienes este ritmo, en 10 años multiplicarás tu patrimonio sin necesidad de rentabilidades heroicas.`});
  else if(sr>=0.2)strengths.push({t:"Tasa de ahorro saludable",d:`Ahorras ${fP(sr)}, el objetivo clásico del 20%. Base sólida para construir patrimonio a largo plazo.`});
  if(runway>=12)strengths.push({t:"Fondo de emergencia sólido",d:`Tienes ${runway} meses de gasto cubierto en efectivo. Si pierdes ingresos mañana, tienes más de un año de margen sin tocar inversiones.`});
  else if(runway>=6)strengths.push({t:"Fondo de emergencia aceptable",d:`${runway} meses de gasto en efectivo. Cumples el mínimo recomendado (6 meses).`});
  if(patDelta>0&&patDeltaPct>=0.1)strengths.push({t:"Patrimonio creciendo fuerte",d:`+${fP(patDeltaPct)} YoY (${fmt(patDelta)} zł). Por encima del 10% anual — interés compuesto trabajando a tu favor.`});
  else if(patDelta>0)strengths.push({t:"Patrimonio en positivo",d:`+${fmt(patDelta)} zł YoY. Vas hacia arriba, aunque hay margen para acelerar.`});
  if(patNow>0&&tIY>0&&gastosFijos/tIY<0.5)strengths.push({t:"Gastos fijos controlados",d:`Fijos son ${fP(gastosFijos/tIY)} de tus ingresos (<50%). Tienes flexibilidad: si baja el ingreso, puedes aguantar sin tocar fijos.`});
  if(avgMonthlySavings>=1000)strengths.push({t:"Ahorro mensual fuerte",d:`${fmt(Math.round(avgMonthlySavings))} zł al mes. Si inviertes esto al 7% anual, en 20 años acumulas ~${fmt(Math.round(avgMonthlySavings*12*((Math.pow(1.07,20)-1)/0.07)/1000))}k zł.`});
  // --- Weaknesses ---
  const weaknesses=[];
  if(sr<0)weaknesses.push({t:"Gastas más de lo que ingresas",d:`Tasa de ahorro negativa (${fP(sr)}): te estás comiendo patrimonio. Esto NO es sostenible. Identifica las 3 categorías de gasto más grandes y corta un 20% en cada una.`});
  else if(sr<0.1)weaknesses.push({t:"Tasa de ahorro muy baja",d:`Solo ${fP(sr)}. Con esta tasa, jubilarte cómodamente requeriría trabajar ~50 años o rentabilidades muy altas. Objetivo mínimo: 15-20%.`});
  else if(sr<0.2)weaknesses.push({t:"Tasa de ahorro mejorable",d:`${fP(sr)} está por debajo del 20% objetivo. Cada 5 puntos de subida reducen tu tiempo a FIRE en ~7 años.`});
  if(runway<3)weaknesses.push({t:"Sin fondo de emergencia",d:`Solo ${runway} meses de efectivo. Un imprevisto (avería coche, reparación casa, mes sin ingresos) te forzará a vender inversiones o endeudarte. Crítico construir 3-6 meses antes de nada más.`});
  else if(runway<6)weaknesses.push({t:"Fondo de emergencia insuficiente",d:`${runway} meses cubiertos. Por debajo del mínimo estándar (6 meses). Sube el colchón antes de aumentar inversión a largo plazo.`});
  if(patNow<0)weaknesses.push({t:"Patrimonio neto negativo",d:`Tus deudas superan tus activos en ${fmt(Math.abs(patNow))} zł. Prioridad: pagar deuda cara (tarjetas, préstamos consumo) antes que cualquier inversión que rinda menos que el interés que pagas.`});
  if(patDelta<0)weaknesses.push({t:"Patrimonio retrocediendo",d:`Has perdido ${fmt(Math.abs(patDelta))} zł (${fP(patDeltaPct)}) respecto al año anterior. Hay que entender por qué: ¿caída de activos, más deuda, o gasto puntual grande?`});
  if(tIY>0&&gastosFijos/tIY>0.6)weaknesses.push({t:"Gastos fijos demasiado altos",d:`${fP(gastosFijos/tIY)} de tus ingresos van a fijos. Poca flexibilidad si baja el ingreso. Atacar los dos más grandes: vivienda y suscripciones/servicios.`});
  if(tMeY>0&&(tMeY-gastosFijos)>gastosFijos)weaknesses.push({t:"Variables descontrolados",d:`Tus gastos variables (${fmt(tMeY-gastosFijos)}) superan a los fijos (${fmt(gastosFijos)}). Revisa la pestaña Gastos > Heatmap para ver qué categorías (ocio, restaurantes, compras) disparan cada mes.`});
  // --- Strategic actions ---
  const actions=[];
  if(sr<0.2&&tIY>0){
    const target=0.2;const need=Math.max(0,tIY*target-rY);
    if(need>0)actions.push({t:"Plan: llegar al 20% de ahorro",d:`Ahora ahorras ${fmt(rY)} zł/año (${fP(sr)}). Para el 20% necesitas ${fmt(Math.round(need))} zł más al año = ${fmt(Math.round(need/12))} zł/mes. Opciones: renegociar 1-2 fijos grandes (hipoteca, seguros, móvil) y cortar variables puntuales (ocio, restaurantes).`});
  }
  if(runway<6&&liquidAssets>=0){
    const needLiq=Math.max(0,monthlyExpTotal*6-liquidAssets);
    if(needLiq>0)actions.push({t:"Construye fondo de emergencia",d:`Necesitas ${fmt(Math.round(needLiq))} zł más en efectivo para llegar a 6 meses. Pausa inversiones nuevas hasta cubrirlo. Cuenta remunerada o depósito a plazo — no bolsa, no cripto.`});
  }
  if(sr>=0.2&&liquidAssets>monthlyExpTotal*12&&patNow>0){
    const excess=liquidAssets-monthlyExpTotal*12;
    actions.push({t:"Exceso de liquidez — mueve a inversión",d:`Tienes ${fmt(Math.round(excess))} zł en efectivo por encima de 12 meses de colchón. Ese dinero pierde ~2-3% al año por inflación. Al 7% invertido, en 10 años serían ~${fmt(Math.round(excess*Math.pow(1.07,10)/1000))}k zł.`});
  }
  if(m7RetAge>m7Age&&m7Need>0){
    const yrsToRet=m7RetAge-m7Age;
    const r=m7RetReturn/100;
    const annNeed=m7Need*12;
    const targetPat=r>0?annNeed*((1-Math.pow(1+r,-(90-m7RetAge)))/r):annNeed*(90-m7RetAge);
    const gap=targetPat-patNow;
    const annNeed2=yrsToRet>0?gap/yrsToRet:gap;
    if(m7Accum<annNeed2&&annNeed2>0)actions.push({t:`Jubilación: acumulación insuficiente`,d:`A tu ritmo (${fmt(m7Accum)} zł/año), no llegas al patrimonio necesario (${fmt(Math.round(targetPat))} zł a los ${m7RetAge}). Necesitas acumular ${fmt(Math.round(annNeed2))} zł/año — o subir rentabilidad proyectada, o retrasar jubilación.`});
  }
  if(tIY>0&&tAeY/tIY>0.15)actions.push({t:"Gastos anuales pesan mucho",d:`Gastos anuales (${fmt(tAeY)}) son ${fP(tAeY/tIY)} de tus ingresos. Vacaciones, seguros, revisiones — acumularlos mensualmente (${fmt(Math.round(tAeY/12))} zł/mes) evita meses de "se me fue todo".`});
  if(strengths.length===0&&weaknesses.length===0&&actions.length===0){
    strengths.push({t:"Dashboard aún sin datos",d:"Cuando tengas al menos ingresos y gastos para este año, aparecerá aquí la lectura personalizada."});
  }
  const Section=({icon,title,items,color})=>items.length===0?null:<div style={{marginTop:14}}>
    <div style={{fontSize:13,fontWeight:700,color:color,marginBottom:8}}>{icon} {title}</div>
    <ul style={{listStyle:"none",padding:0,margin:0}}>{items.map((it,i)=><li key={i} style={{padding:"8px 12px",marginBottom:6,borderRadius:8,background:C.sa,borderLeft:`3px solid ${color}`}}>
      <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:3}}>{it.t}</div>
      <div style={{fontSize:12,color:C.td,lineHeight:1.55}}>{it.d}</div>
    </li>)}</ul>
  </div>;
  return<Cd style={{marginBottom:14,borderLeft:`4px solid ${overall.c}`}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:20}}>💡</span><h3 style={{fontSize:15,fontWeight:600}}>Lectura Financiera — {selYear}</h3></div>
    <div style={{padding:"12px 14px",borderRadius:8,background:overall.bg,borderLeft:`3px solid ${overall.c}`,marginBottom:6}}>
      <div style={{fontSize:14,fontWeight:700,color:overall.c,marginBottom:4}}>{overall.l}</div>
      <div style={{fontSize:12,color:C.td,lineHeight:1.6}}>{overall.msg}</div>
    </div>
    <Section icon="✅" title="Lo que está bien" items={strengths} color={C.gn}/>
    <Section icon="⚠️" title="Áreas de mejora" items={weaknesses} color={C.am}/>
    <Section icon="🎯" title="Acciones sugeridas" items={actions} color={C.bl}/>
  </Cd>;
}

function M0(){
  const{income:inc,monthlyExp:me,annualExp:ae,savingsGoal:sg,selYear,setYear,YEARS}=useContext(Ctx);
  const[savedHip]=useLocalData("hipScenario",null);
  const tIM0=MO.map((_,m)=>inc.reduce((s,r)=>s+valInc(r,m),0));

  const safeMe0=me.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const safeAe0=ae.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const tMeM0=MO.map((_,m)=>safeMe0.reduce((s,r)=>s+valMe(r,m),0));
  const tAeM0=MO.map((_,m)=>safeAe0.reduce((s,r)=>s+valAe(r,m),0));
  const tMeY=tMeM0.reduce((a,b)=>a+b,0);
  const tAeY=tAeM0.reduce((a,b)=>a+b,0);
  const tEY=tMeY+tAeY;
  const rY=tIY-tEY,sr=tIY>0?rY/tIY:0;
  const bestMonth=MO[MO.map((_,m)=>tIM0[m]-tMeM0[m]-tAeM0[m]).reduce((best,v,i,a)=>v>a[best]?i:best,0)];
  const[savedMC]=useLocalData("mcGoal",null);
  const[assets]=useLocalData("assets",D_AS);const[debts]=useLocalData("debts",D_DB);
  const patYrIdx=yearToIdx(new Date().getFullYear());
  const patNow=assets.reduce((s,a)=>s+(a.values?.[patYrIdx]||0),0)-debts.reduce((s,d)=>s+(d.values?.[patYrIdx]||0),0);
  const patYear=PAT_START_YEAR+patYrIdx;
  const patPrevIdx=Math.max(0,patYrIdx-1);
  const patPrev=assets.reduce((s,a)=>s+(a.values?.[patPrevIdx]||0),0)-debts.reduce((s,d)=>s+(d.values?.[patPrevIdx]||0),0);
  const patDelta=patNow-patPrev;
  const patDeltaPct=patPrev!==0?patDelta/Math.abs(patPrev):0;
  const[m7Age]=useLocalData("m7Age",35);const[m7RetAge]=useLocalData("m7RetAge",65);const[m7LifeExp]=useLocalData("m7LifeExp",90);const[m7Need]=useLocalData("m7Need",2000);const[m7Accum]=useLocalData("m7Accum",0);const[m7RetReturn]=useLocalData("m7RetReturn",3);

  // KPI computations
  const monthlyExpTotal=tEY/12;

  const runway=monthlyExpTotal>0?Math.round(liquidAssets/monthlyExpTotal):0;
  const avgMonthlySavings=rY/12;

  // Waterfall data
  const FIJO_TYPES=getFijoTypes(getExpTypes());
  const gastosFijos=MO.map((_,m)=>safeMe0.filter(r=>FIJO_TYPES.includes(r.type)).reduce((s,r)=>s+valMe(r,m),0)).reduce((a,b)=>a+b,0);
  const gastosVar=tMeY-gastosFijos;
  const ahorroCF=tIY-gastosFijos-gastosVar-tAeY;

  // Patrimonio timeline by asset class
  const tEfectivo=PAT_YEARS.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="efectivo").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tInversion=PAT_YEARS.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="inversión").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tPasivo=PAT_YEARS.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="pasivo"||a.type==="otro").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  // Catch-all: assets with any other/missing type (so netWorth matches patNow)
  const tOther=PAT_YEARS.map(y=>{const i=yearToIdx(y);return assets.filter(a=>!["efectivo","inversión","pasivo","otro"].includes(a.type)).reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tDebt=PAT_YEARS.map(y=>{const i=yearToIdx(y);return debts.reduce((s,d)=>s+(d.values?.[i]||0),0)});
  const netWorth=PAT_YEARS.map((_,i)=>(tEfectivo[i]+tInversion[i]+tPasivo[i]+tOther[i])-tDebt[i]);

  // Waterfall SVG

    const maxAbs=Math.max(...bars.map(b=>Math.abs(b.value)),1);

      {bars.map((b,i)=>{const bH=Math.max((Math.abs(b.value)/maxAbs)*(cH/2-8),3);const x=pL+(cW/bars.length)*i+(cW/bars.length-bW)/2;const y=b.value>=0?mid-bH:mid;
        return<g key={i}>
          <rect x={x} y={y} width={bW} height={bH} rx={4} fill={b.color} opacity={.7}/>

          <text x={x+bW/2} y={height-6} textAnchor="middle" fill={C.td} fontSize={10}>{b.label}</text>
        </g>})}
      {(()=>{let running=0;const connectors=[];bars.forEach((b,i)=>{const prev=running;running+=b.value;if(i<bars.length-1){const x1=pL+(cW/bars.length)*i+(cW/bars.length+bW)/2;const x2=pL+(cW/bars.length)*(i+1)+(cW/bars.length-bW)/2;const yLine=running>=0?mid-(running/maxAbs)*(cH/2-8):mid+(-running/maxAbs)*(cH/2-8);connectors.push(<line key={"c"+i} x1={x1} y1={yLine} x2={x2} y2={yLine} stroke={C.bh} strokeWidth={1} strokeDasharray="3 2"/>)}});return connectors})()}
    </svg>;
  };

  // Stacked Area Chart
  const AreaChart=({width=900,height=240})=>{
    const stacked=PAT_YEARS.map((_,i)=>[tEfectivo[i],tEfectivo[i]+tInversion[i],tEfectivo[i]+tInversion[i]+tPasivo[i]+tOther[i]]);
    const maxStack=Math.max(...stacked.map(s=>s[2]),1);
    const minNW=Math.min(...netWorth,0);const maxNW=Math.max(...netWorth,maxStack);
    const allMax=Math.max(maxStack,maxNW);const allMin=Math.min(minNW,0);
    const range=allMax-allMin||1;
    const pL=55,pR=20,pT=16,pB=28,cW=width-pL-pR,cH=height-pT-pB;
    const xP=i=>pL+(i/(PAT_YEARS.length-1))*cW;
    const yP=v=>pT+cH-((v-allMin)/range)*cH;
    const mkArea=(getTop,getBot)=>{const top=PAT_YEARS.map((_,i)=>`${i===0?"M":"L"}${xP(i)} ${yP(getTop(i))}`).join(" ");const bot=[...PAT_YEARS.keys()].reverse().map(i=>`L${xP(i)} ${yP(getBot(i))}`).join(" ");return top+" "+bot+" Z"};

    const yTicks=Array.from({length:5},(_,i)=>allMin+(range*i/4));
    return<svg viewBox={`0 0 ${width} ${height}`} style={{display:"block",width:"100%",height:"auto"}}>
      {yTicks.map((v,i)=><g key={i}><line x1={pL} y1={yP(v)} x2={width-pR} y2={yP(v)} stroke={C.bd} strokeWidth={.5} strokeDasharray="3 3"/><text x={pL-6} y={yP(v)+4} textAnchor="end" fill={C.tm} fontSize={8} {...mn}>{fmt(Math.round(v/1000))}k</text></g>)}
      <path d={mkArea(i=>stacked[i][2],()=>0)} fill={C.am} opacity={.15}/>
      <path d={mkArea(i=>stacked[i][1],i=>stacked[i][0])} fill={C.pu} opacity={.2}/>
      <path d={mkArea(i=>stacked[i][0],()=>0)} fill={C.ac} opacity={.25}/>
      <path d={nwLine} fill="none" stroke={C.tx} strokeWidth={2.5} strokeLinecap="round"/>
      {PAT_YEARS.map((_,i)=><g key={i}>
        <circle cx={xP(i)} cy={yP(netWorth[i])} r={3} fill={C.w} stroke={C.tx} strokeWidth={2}/>
        <text x={xP(i)} y={height-6} textAnchor="middle" fill={C.tm} fontSize={9}>{PAT_YEARS[i]}</text>
        {i%2===0&&<text x={xP(i)} y={yP(netWorth[i])-9} textAnchor="middle" fill={C.td} fontSize={8} {...mn}>{fmt(Math.round(netWorth[i]/1000))}k</text>}
      </g>)}
    </svg>;
  };

  return<div style={{animation:"fadeIn .3s"}}>
    <Cd style={{marginBottom:16,background:`linear-gradient(135deg,${C.ad},${C.gd})`,borderTop:`3px solid ${C.ac}`}}>

        <div><h2 style={{fontSize:22,fontWeight:700}}>Tu dinero, tus reglas 💪</h2><p style={{fontSize:13,color:C.td}}>Resumen de tu vida financiera. Cada número cuenta una historia.</p></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",padding:"10px 14px",borderRadius:10,background:C.sa,border:`1px solid ${C.bd}`}}>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

      {(()=>{

function CategoriesEditor({onClose,meRows,aeRows}){
  const[types,setTypes]=useState(getExpTypes());

  const useCount=(name)=>[...(meRows||[]),...(aeRows||[])].filter(r=>(r.type||"Otros")===name).length;
  const toggleFijo=(i)=>{const n=[...types];n[i]={...n[i],isFijo:!n[i].isFijo};setTypes(n)};
  const remove=(i)=>{const name=types[i].name;if(name==="Otros")return alert("No se puede borrar Otros");const c=useCount(name);if(c>0)return alert(`No se puede borrar "${name}": ${c} fila(s) la usan. Reasígnalas primero.`);setTypes(types.filter((_,j)=>j!==i))};
  const add=()=>{const n=newName.trim();if(!n)return;if(types.some(t=>t.name.toLowerCase()===n.toLowerCase()))return alert("Ya existe");setTypes([...types,{name:n,isFijo:false}]);setNewName("")};

      <p style={{fontSize:11,color:C.tm,marginBottom:12}}>Marca 🔒 Fijo para categorías que cuentan como gasto fijo en Waterfall (M0) y Fijos vs Variables (M1b).</p>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:14}}>

        <tbody>{types.map((t,i)=>{const c=useCount(t.name);return<tr key={i} style={{borderBottom:`1px solid ${C.bg}`}}>
          <td style={{padding:"5px 6px",fontWeight:500}}>{t.name}</td>
          <td style={{padding:"5px",textAlign:"center"}}><button onClick={()=>toggleFijo(i)} style={{background:t.isFijo?C.rdd:"transparent",color:t.isFijo?C.rd:C.tm,border:`1px solid ${t.isFijo?C.rd:C.bd}`,borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11,fontWeight:600}}>{t.isFijo?"🔒 Fijo":"Variable"}</button></td>
          <td style={{padding:"5px 6px",textAlign:"right",...mn,color:c>0?C.ac:C.tm}}>{c}</td>
          <td style={{padding:"5px"}}>{t.name!=="Otros"&&<Xb onClick={()=>remove(i)}/>}</td>
        </tr>})}</tbody>
      </table>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nueva categoría" style={{flex:1,padding:"7px 10px",borderRadius:6,border:`1px solid ${C.bd}`,fontSize:12}} onKeyDown={e=>e.key==="Enter"&&add()}/>

    </div>
  </div>;
}

function M1b(){
  const{monthlyExp:me,annualExp:ae,selYear,meHist,aeHist}=useContext(Ctx);
  const FIJO=getFijoTypes(getExpTypes());
  const safeMe=me.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const val=(r,m)=>valMe(r,m);

  // --- Heatmap data by type x month (includes annual expenses pro-rated or real[m]) ---
  const safeAeH=ae.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const heatByType=useMemo(()=>{
    const map={};EXP_TYPES.forEach(t=>map[t]=Array(12).fill(0));
    safeMe.forEach(r=>{const t=r.type||"Otros";if(!map[t])map[t]=Array(12).fill(0);MO.forEach((_,m)=>{map[t][m]+=valMe(r,m)})});
    safeAeH.forEach(r=>{const t=r.type||"Otros";if(!map[t])map[t]=Array(12).fill(0);MO.forEach((_,m)=>{map[t][m]+=valAe(r,m)})});
    return map;
  },[safeMe,safeAeH]);
  const heatRowTotals=useMemo(()=>{const o={};Object.keys(heatByType).forEach(t=>o[t]=heatByType[t].reduce((a,b)=>a+b,0));return o},[heatByType]);
  const heatColTotals=useMemo(()=>MO.map((_,m)=>Object.keys(heatByType).reduce((s,t)=>s+heatByType[t][m],0)),[heatByType]);
  const heatMax=useMemo(()=>Math.max(...Object.values(heatByType).flat(),1),[heatByType]);
  // Dark-mode compatible: rgba with fixed red base, opacity proportional to intensity.
  const heatClr=(v)=>{if(v<=0)return"transparent";const intensity=Math.min(v/heatMax,1);return`rgba(220,38,38,${(intensity*0.35).toFixed(3)})`};

  // --- Fijos vs Variables ---
  const fijosM=MO.map((_,m)=>safeMe.filter(r=>FIJO.includes(r.type)).reduce((s,r)=>s+val(r,m),0));
  const varsM=MO.map((_,m)=>safeMe.filter(r=>!FIJO.includes(r.type)).reduce((s,r)=>s+val(r,m),0));
  const totalFijo=fijosM.reduce((a,b)=>a+b,0);
  const totalVar=varsM.reduce((a,b)=>a+b,0);
  const totalAll=totalFijo+totalVar;
  const pctFijo=totalAll>0?totalFijo/totalAll:0;
  const pctVar=totalAll>0?totalVar/totalAll:0;

  // --- MoM ---
  const lastMonth=useMemo(()=>{for(let m=11;m>=0;m--){if(safeMe.some(r=>r.real?.[m]!=null))return m}return -1},[safeMe]);
  const prevMonth=lastMonth>0?lastMonth-1:-1;
  const momData=useMemo(()=>{
    if(lastMonth<0||prevMonth<0)return[];
    return EXP_TYPES.map(t=>{
      const cur=safeMe.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+val(r,lastMonth),0);
      const prev=safeMe.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+val(r,prevMonth),0);
      const delta=cur-prev;const pct=prev>0?delta/prev:cur>0?1:0;
      return{type:t,cur,prev,delta,pct};
    }).filter(d=>d.cur>0||d.prev>0);
  },[safeMe,lastMonth,prevMonth]);
  const momBadge=(pct)=>{if(pct<=-0.05)return{c:C.gn,bg:C.gd,l:"Baja"};if(pct>=0.05)return{c:C.rd,bg:C.rdd,l:"Sube"};return{c:C.am,bg:C.amd,l:"Estable"}};

  // --- YoY ---
  const prevYear=selYear-1;
  const prevMeRaw=meHist?.[prevYear]||[];
  const prevAeRaw=aeHist?.[prevYear]||[];
  const yoyData=useMemo(()=>{
    return EXP_TYPES.map(t=>{
      const curMe=safeMe.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+MO.reduce((ss,_,m)=>ss+val(r,m),0),0);
      const curAe=ae.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+(r.annual||0),0);
      const cur=curMe+curAe;
      const pMe=prevMeRaw.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+MO.reduce((ss,_,m)=>ss+valMe(r,m),0),0);
      const pAe=prevAeRaw.filter(r=>(r.type||"Otros")===t).reduce((s,r)=>s+(r.annual||0),0);
      const prev=pMe+pAe;
      const delta=cur-prev;const pct=prev>0?delta/prev:cur>0?1:0;

  return<div style={{animation:"fadeIn .3s"}}>

        <tbody>
          {Object.keys(heatByType).filter(t=>heatRowTotals[t]>0).map(t=><tr key={t}>

            <td style={{padding:"4px 5px",textAlign:"right",...mn,fontSize:11,fontWeight:700,color:C.rd}}>{fmt(heatRowTotals[t])}</td>

          <tr style={{borderTop:`2px solid ${C.bd}`}}>
            <td style={{padding:"6px",fontWeight:700,position:"sticky",left:0,background:C.sf}}>TOTAL</td>
            {heatColTotals.map((v,m)=><td key={m} style={{padding:"4px 4px",textAlign:"right",...mn,fontSize:11,fontWeight:700,color:C.rd}}>{fmt(v)}</td>)}
            <td style={{padding:"4px 5px",textAlign:"right",...mn,fontSize:12,fontWeight:700,color:C.rd}}>{fmt(heatColTotals.reduce((a,b)=>a+b,0))}</td>

        </tbody>
      </table>
    </Cd>

    {/* B) Fijos vs Variables */}
    <Cd style={{marginBottom:16}}>
      <ST icon="⚖️">Fijos vs Variables</ST>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{padding:10,borderRadius:8,background:C.rdd,textAlign:"center",borderLeft:`3px solid ${C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Fijos</div><div style={{fontSize:16,fontWeight:700,color:C.rd,...mn}}>{fmt(totalFijo)} zł</div><div style={{fontSize:10,color:C.tm}}>{fP(pctFijo)}</div></div>
        <div style={{padding:10,borderRadius:8,background:C.amd,textAlign:"center",borderLeft:`3px solid ${C.am}`}}><div style={{fontSize:9,color:C.tm}}>Variables</div><div style={{fontSize:16,fontWeight:700,color:C.am,...mn}}>{fmt(totalVar)} zł</div><div style={{fontSize:10,color:C.tm}}>{fP(pctVar)}</div></div>
        <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.ac}`}}><div style={{fontSize:9,color:C.tm}}>Total</div><div style={{fontSize:16,fontWeight:700,color:C.ac,...mn}}>{fmt(totalAll)} zł</div></div>

    {/* C) MoM */}
    <Cd style={{marginBottom:16}}>
      <ST icon="📅" sub={prevMonth>=0?`${MO[prevMonth]} → ${MO[lastMonth]}`:""}>{`Comparador MoM (${selYear})`}</ST>

          <td style={{padding:"5px 6px",fontWeight:600}}>{d.type}</td>

            <td style={{padding:"5px 6px",fontWeight:500}}>{r.name}</td>

function M2(){
  const[assets,sAs]=useLocalData("assets",D_AS);const[debts,sDb]=useLocalData("debts",D_DB);
  const[incHist]=useLocalData("incomeHistory",{});
  const[meHistAll]=useLocalData("meHistory",{});
  const[aeHistAll]=useLocalData("aeHistory",{});
  const dAs=useDrag(assets,sAs);const dDb=useDrag(debts,sDb);
  const yrs=PAT_YEARS;const nY=yrs.length;const sY=yrs[0];
  const requiredLen=yearToIdx(yrs[yrs.length-1])+1;
  useEffect(()=>{
    if(assets.some(a=>(a.values?.length||0)<requiredLen))sAs(ensureValuesLength(assets,requiredLen));
    if(debts.some(d=>(d.values?.length||0)<requiredLen))sDb(ensureValuesLength(debts,requiredLen));
  },[requiredLen]);
  const[projGrowth,sPG]=useLocalData("projGrowth",Array(nY).fill({pct:5}));
  const safePG=Array.isArray(projGrowth)?projGrowth:Array(nY).fill({pct:5});
  const defHist=yrs.map(y=>({year:y,income:0,expense:0,override:false}));
  const[hist,sHist]=useLocalData("finHistory",defHist);
  // Compute income/expense from M1 histories for a given year
  const computeFinFromM1=(year)=>{
    const incData=incHist[year]||[];const meData=meHistAll[year]||[];const aeData=aeHistAll[year]||[];
    const income=MO.reduce((s,_,m)=>s+incData.reduce((ss,r)=>ss+valInc(r,m),0),0);
    const expense=MO.reduce((s,_,m)=>s+meData.reduce((ss,r)=>ss+valMe(r,m),0)+aeData.reduce((ss,r)=>ss+valAe(r,m),0),0);
    return{income:Math.round(income),expense:Math.round(expense)};
  };
  const safeH=yrs.map((y)=>{
    const f=Array.isArray(hist)?hist.find(h=>h.year===y):null;
    if(f&&f.override)return{...f,auto:false};
    const c=computeFinFromM1(y);
    return{year:y,income:f?.income||c.income,expense:f?.expense||c.expense,override:false,auto:!(f&&(f.income>0||f.expense>0))};
  });
  const updH=(i,f,v)=>{const n=yrs.map((y,j)=>{if(j===i){const cur=safeH[j];return{year:y,income:f==="income"?(Number(v)||0):cur.income,expense:f==="expense"?(Number(v)||0):cur.expense,override:true}}const h=safeH[j];return{year:h.year,income:h.income,expense:h.expense,override:h.override}});sHist(n)};
  const resetAuto=(i)=>{const n=yrs.map((y,j)=>{if(j===i){const c=computeFinFromM1(y);return{year:y,income:c.income,expense:c.expense,override:false}}const h=safeH[j];return{year:h.year,income:h.income,expense:h.expense,override:h.override}});sHist(n)};
  const savH=safeH.map(h=>h.income-h.expense);
  const srH=safeH.map(h=>h.income>0?(h.income-h.expense)/h.income:0);

  const tA=yrs.map(y=>{const i=yearToIdx(y);return assets.reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tEfectivo=yrs.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="efectivo").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tInversion=yrs.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="inversión").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tPasivo=yrs.map(y=>{const i=yearToIdx(y);return assets.filter(a=>a.type==="pasivo"||a.type==="otro").reduce((s,a)=>s+(a.values?.[i]||0),0)});
  const tD=yrs.map(y=>{const i=yearToIdx(y);return debts.reduce((s,d)=>s+(d.values?.[i]||0),0)});
  const pat=yrs.map((_,i)=>tA[i]-tD[i]);
  const rend=pat.map((v,i)=>i===0?0:(pat[i-1]?((v-pat[i-1])/pat[i-1]):0));

  const projBase=pat.reduce((last,v,i)=>v>0?i:last,-1);

  const MLChart=({width=620,height=200})=>{const allV=[...safeH.map(h=>h.income),...safeH.map(h=>h.expense),...savH];if(allV.every(v=>v===0))return<div style={{textAlign:'center',padding:30,color:C.tm,fontSize:12}}>Rellena el histórico de ingresos y gastos arriba</div>;const mx=Math.max(...allV,1),mi=Math.min(...allV,0),rg=mx-mi||1;const pX=50,pY=18,cW=width-pX*2,cH=height-pY*2;const mkP=data=>data.map((v,i)=>({x:pX+(i/(data.length-1))*cW,y:pY+cH-((v-mi)/rg)*cH}));const mkD=pts=>pts.map((p,i)=>`${i===0?"M":"L"}${p.x} ${p.y}`).join(" ");const pI=mkP(safeH.map(h=>h.income)),pE=mkP(safeH.map(h=>h.expense)),pS=mkP(savH);return<svg viewBox={`0 0 ${width} ${height}`} style={{display:"block",width:"100%",height:"auto"}}><path d={mkD(pI)} fill="none" stroke={C.gn} strokeWidth={2.5}/><path d={mkD(pE)} fill="none" stroke={C.rd} strokeWidth={2.5}/><path d={mkD(pS)} fill="none" stroke={C.ac} strokeWidth={2} strokeDasharray="6 3"/>{pI.map((p,i)=><g key={"i"+i}><circle cx={p.x} cy={p.y} r={3} fill={C.w} stroke={C.gn} strokeWidth={2}/><text x={p.x} y={height-2} textAnchor="middle" fill={C.tm} fontSize={9}>{yrs[i]}</text></g>)}{pE.map((p,i)=><circle key={"e"+i} cx={p.x} cy={p.y} r={3} fill={C.w} stroke={C.rd} strokeWidth={2}/>)}{pS.map((p,i)=><circle key={"s"+i} cx={p.x} cy={p.y} r={3} fill={C.w} stroke={C.ac} strokeWidth={2}/>)}</svg>};

  // --- Pie chart data for current year asset allocation (index into yrs array) ---
  const curYrIdx=Math.min(nY-1,Math.max(0,new Date().getFullYear()-sY));
  // Note: tEfectivo/tInversion/tPasivo are yrs-indexed (not storage-indexed), so curYrIdx is correct here
  const pieEfectivo=tEfectivo[curYrIdx]||0;
  const pieInversion=tInversion[curYrIdx]||0;

ition:"sticky",left:0,background:C.sf}}>TOTAL</td><td></td>{tA.map((v,i)=><td key={i} style={{padding:"8px 4px",textAlign:"right",...mn,fontSize:12,fontWeight:700,color:C.gn}}>{fmt(v)}</td>)}<td></td></tr></tbody></table><Ab onClick={()=>sAs([...assets,{name:"(nuevo)",type:"efectivo",values:Array(requiredLen).fill(0)}])}/></Cd>

function M3(){
  const allCtx=useContext(Ctx);
  const[propPrice,sPropPrice]=useLocalData("hPP",350000);const[dpPct,sDpPct]=useLocalData("hDP",20);

  ];
  const[euriborData]=useState(EURIBOR_HIST);
  const lastEuribor=euriborData[euriborData.length-1];
  const maxEuribor=Math.max(...euriborData.map(d=>d.v));

  const avgEuribor=euriborData.reduce((s,d)=>s+d.v,0)/euriborData.length;

  const EuriborChart=({width=900,height=240})=>{
    const data=euriborData;const vals=data.map(d=>d.v);

      {yLabs.map(v=><g key={v}><line x1={pX} y1={pY+cH-((v-mi)/rg)*cH} x2={width-20} y2={pY+cH-((v-mi)/rg)*cH} stroke={C.bd} strokeWidth={.5} strokeDasharray="3 3"/><text x={pX-6} y={pY+cH-((v-mi)/rg)*cH+4} textAnchor="end" fill={C.tm} fontSize={9} {...mn}>{v.toFixed(1)}%</text></g>)}
      <path d={mkD(pts)+`L${pts[pts.length-1].x} ${pY+cH}L${pts[0].x} ${pY+cH}Z`} fill="url(#eurGrad)"/>
      <path d={mkD(pts)} fill="none" stroke={C.ac} strokeWidth={2}/>
      {pts.map((p,i)=>{const show=i%2===0||i===data.length-1;return<g key={i}>
        {show&&<circle cx={p.x} cy={p.y} r={2.5} fill={C.w} stroke={C.ac} strokeWidth={1.5}/>}
        {show&&<text x={p.x} y={height-4} textAnchor="middle" fill={C.tm} fontSize={8} transform={data[i].p.length>4?`rotate(-30 ${p.x} ${height-4})`:undefined}>{data[i].p}</text>}

  };

  const step=15000,rStep=0.25;
  const rates=useMemo(()=>{const r=[];for(let i=0.5;i<=6;i+=rStep)r.push(Math.round(i*1000)/1000);return r},[]);
  const amounts=useMemo(()=>{const a=[];for(let v=amt-step*5;v<=amt+step*5;v+=step)if(v>0)a.push(v);return a},[amt]);
  const calc=(p,r,y,n)=>{const ri=r/100/n,np=y*n;if(ri===0)return p/np;return(p*ri*Math.pow(1+ri,np))/(Math.pow(1+ri,np)-1)};
  const matrix=useMemo(()=>amounts.map(a=>rates.map(r=>calc(a,r,yrs,ppy))),[amounts,rates,yrs]);
  const cc=(val,r,a)=>{if(val>=tMin&&val<=tMax)return{bg:C.gd,t:C.gn};if(Math.abs(r-tin)<rStep/2&&a===amt)return{bg:C.bld,t:C.bl};return{bg:"transparent",t:C.tm}};

  return<div style={{animation:"fadeIn .3s"}}>
    <div style={{padding:"10px 14px",borderRadius:8,background:C.ad,border:`1px solid ${C.ac30}`,marginBottom:14,fontSize:12,color:C.td,lineHeight:1.6}}>

        <div><Lb>Entrada (%)</Lb><input type="number" value={dpPct} onChange={e=>sDpPct(Number(e.target.value)||0)} step="5"/><div style={{fontSize:10,color:C.am,fontWeight:600,marginTop:3,...mn}}>{fmt(entrada)} zł</div></div>
        <div><Lb>Importe hipoteca (zł) <span style={{color:C.ac,fontSize:10}}>auto</span></Lb><div style={{padding:"8px",borderRadius:7,background:C.ad,border:`1px solid ${C.ac40}`,textAlign:"right",...mn,fontSize:14,fontWeight:700,color:C.ac}}>{fmt(amt)} zł</div></div>
        <div><Lb>TIN (%)</Lb><input type="number" value={tin} onChange={e=>sTin(Number(e.target.value)||0)} step="0.01"/></div>
        <div><Lb>Plazo (años)</Lb><input type="number" value={yrs} onChange={e=>sYrs(Number(e.target.value)||0)}/></div>
        <div><Lb>Cuota Obj. Mín (zł)</Lb><input type="number" value={tMin} onChange={e=>sTMin(Number(e.target.value)||0)}/></div>
        <div><Lb>Cuota Obj. Máx (zł)</Lb><input type="number" value={tMax} onChange={e=>sTMax(Number(e.target.value)||0)}/></div>

      <Pill title="Regla de oro: cuota &lt; 35% de tus ingresos">Cuanto menor sea ese %, menos vulnerable eres ante imprevistos. Una cuota del 25% te da mucho más colchón.</Pill>
    </Cd>

    <Cd style={{marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 12px"}}>
      <ST icon="📈" sub="Histórico Euríbor 12M">Euríbor</ST>

        <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Máximo</div><div style={{fontSize:18,fontWeight:700,color:C.rd,...mn}}>{maxEuribor.toFixed(3)}%</div></div>
        <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.gn}`}}><div style={{fontSize:9,color:C.tm}}>Mínimo</div><div style={{fontSize:18,fontWeight:700,color:C.gn,...mn}}>{minEuribor.toFixed(3)}%</div></div>
        <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.bl}`}}><div style={{fontSize:9,color:C.tm}}>Media</div><div style={{fontSize:18,fontWeight:700,color:C.bl,...mn}}>{avgEuribor.toFixed(3)}%</div></div>
      </div>
      <EuriborChart/>
    </Cd>

    <Cd style={{overflowX:"auto"}}><ST icon="📐">Matriz Cuota Mensual</ST><table style={{borderCollapse:"collapse",fontSize:11}}><thead><tr><th style={{padding:"6px 8px",color:C.ac,fontWeight:600,textAlign:"left",position:"sticky",left:0,background:C.sf,zIndex:2,minWidth:80}}>zł\TIN%</th>{rates.map(r=><th key={r} style={{padding:"5px",color:Math.abs(r-tin)<rStep/2?C.bl:C.tm,fontWeight:Math.abs(r-tin)<rStep/2?700:400,textAlign:"right",minWidth:52,background:Math.abs(r-tin)<rStep/2?C.bld:"transparent"}}>{r.toFixed(2)}</th>)}</tr></thead><tbody>{matrix.map((row,ri)=><tr key={ri}><td style={{padding:"5px 8px",fontWeight:600,color:amounts[ri]===amt?C.bl:C.tx,position:"sticky",left:0,background:amounts[ri]===amt?C.bld:C.sf,zIndex:1,...mn,fontSize:12}}>{fmt(amounts[ri])}</td>{row.map((v,ci)=>{const col=cc(v,rates[ci],amounts[ri]);return<td key={ci} style={{padding:"4px 5px",textAlign:"right",...mn,fontSize:11,background:col.bg,color:col.t}}>{fmt(v,0)}</td>})}</tr>)}</tbody></table></Cd>

    <Cd style={{marginTop:16}}>
      <ST icon="🏦">¿Me dará el banco la hipoteca?</ST>
      {(()=>{const{income:inc}=allCtx;const tIMon=MO.map((_,m)=>inc.reduce((s,r)=>s+valInc(r,m),0));const monthsWithIncome=tIMon.filter(v=>v>0).length;const avgMon=monthsWithIncome>0?tIMon.reduce((a,b)=>a+b,0)/monthsWithIncome:0;const cuota=calc(amt,tin,yrs,ppy);const ratio=avgMon>0?cuota/avgMon:0;const pct=(ratio*100).toFixed(1);const ok=ratio<=0.35;
        const maxCuota=avgMon*0.35;const ri2=tin/100/ppy;const np2=yrs*ppy;const maxHip=ri2>0?maxCuota*(Math.pow(1+ri2,np2)-1)/(ri2*Math.pow(1+ri2,np2)):maxCuota*np2;
        const maxProperty=dpPct>0?maxHip/(1-dpPct/100):maxHip;const entradaNec=maxProperty-maxHip;
        return<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
          <div style={{padding:10,borderRadius:8,background:C.sa,borderLeft:`3px solid ${C.ac}`}}><div style={{fontSize:9,color:C.tm}}>Ingreso mensual</div><div style={{fontSize:16,fontWeight:700,color:C.ac,...mn}}>{fmt(avgMon)} zł</div>{monthsWithIncome<12&&monthsWithIncome>0&&<div style={{fontSize:9,color:C.tm,marginTop:3,fontStyle:"italic"}}>Media sobre {monthsWithIncome} meses con ingresos</div>}</div>
          <div style={{padding:10,borderRadius:8,background:C.sa,borderLeft:`3px solid ${C.am}`}}><div style={{fontSize:9,color:C.tm}}>Tu cuota</div><div style={{fontSize:16,fontWeight:700,color:C.am,...mn}}>{fmt(cuota)} zł</div></div>
          <div style={{padding:10,borderRadius:8,background:ok?C.gd:C.rdd,borderLeft:`3px solid ${ok?C.gn:C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Ratio</div><div style={{fontSize:16,fontWeight:700,color:ok?C.gn:C.rd,...mn}}>{pct}%</div></div>
          <div style={{padding:10,borderRadius:8,background:C.rdd,borderLeft:`3px solid ${C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Total intereses</div><div style={{fontSize:16,fontWeight:700,color:C.rd,...mn}}>{fmt(Math.round(cuota*yrs*12-amt))} zł</div></div>
        </div>
        <div style={{padding:14,borderRadius:10,background:"linear-gradient(135deg,#e0f2fe,#f0fdf4)",border:`1px solid ${C.ac30}`,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:600,color:C.tx,marginBottom:10}}>💰 ¿Cuánto podrías comprar?</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
            <div style={{padding:10,borderRadius:8,background:C.sf,textAlign:"center"}}><div style={{fontSize:9,color:C.tm}}>Hipoteca máxima</div><div style={{fontSize:18,fontWeight:700,color:C.ac,...mn}}>{fmt(maxHip)} zł</div></div>
            <div style={{padding:10,borderRadius:8,background:C.sf,textAlign:"center"}}><div style={{fontSize:9,color:C.tm}}>Precio máx. vivienda</div><div style={{fontSize:18,fontWeight:700,color:C.gn,...mn}}>{fmt(maxProperty)} zł</div></div>
            <div style={{padding:10,borderRadius:8,background:C.sf,textAlign:"center"}}><div style={{fontSize:9,color:C.tm}}>Entrada necesaria</div><div style={{fontSize:18,fontWeight:700,color:C.am,...mn}}>{fmt(entradaNec)} zł</div></div>
          </div>
        </div>
        <Bt onClick={()=>sSavedHip({date:new Date().toLocaleDateString("pl-PL"),propPrice,dpPct,amt,tin,yrs,cuota:Math.round(cuota),ratio:pct,maxHip:Math.round(maxHip),maxProp:Math.round(maxProperty)})} style={{background:"rgba(124,58,237,0.08)",borderColor:C.pu,color:C.pu}}>💾 Guardar escenario</Bt>
        {savedHip&&<span style={{fontSize:11,color:C.pu,marginLeft:10}}>Guardado: {savedHip.date}</span>}
      </div>})()}
    </Cd>

    {/* Amortization Schedule */}
    {(()=>{
      const ri=tin/100/ppy,np=yrs*ppy;
      const cuota=ri===0?amt/np:(amt*ri*Math.pow(1+ri,np))/(Math.pow(1+ri,np)-1);
      // Build amortization schedule
      const amort=[];let balance=amt,cumPrincipal=0,cumInterest=0;
      for(let m=1;m<=np;m++){
        const intPay=balance*ri;const prinPay=cuota-intPay;
        const prinPayReal=Math.min(prinPay,balance);
        balance=Math.max(0,balance-prinPayReal);
        cumPrincipal+=prinPayReal;cumInterest+=intPay;
        amort.push({month:m,interest:intPay,principal:prinPayReal,cumPrincipal,cumInterest,balance});
      }
      const totalInterest=cumInterest;
      const paidPct=amt>0?cumPrincipal/amt:0;

      // Yearly summaries for chart
      const yearlyData=[];
      for(let y=0;y<yrs;y++){
        const entry=amort[Math.min((y+1)*12-1,amort.length-1)];
        if(entry)yearlyData.push({year:y+1,cumP:entry.cumPrincipal,cumI:entry.cumInterest});
      }

      return<>
        <Cd style={{marginTop:16,marginBottom:16}}>
          <ST icon="📊">Progreso de Amortización</ST>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{padding:10,borderRadius:8,background:C.gd,textAlign:"center",borderLeft:`3px solid ${C.gn}`}}><div style={{fontSize:9,color:C.tm}}>Principal pagado</div><div style={{fontSize:16,fontWeight:700,color:C.gn,...mn}}>{fmt(Math.round(cumPrincipal))} zł</div></div>
            <div style={{padding:10,borderRadius:8,background:C.rdd,textAlign:"center",borderLeft:`3px solid ${C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Intereses totales</div><div style={{fontSize:16,fontWeight:700,color:C.rd,...mn}}>{fmt(Math.round(totalInterest))} zł</div></div>
            <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.ac}`}}><div style={{fontSize:9,color:C.tm}}>Cuota mensual</div><div style={{fontSize:16,fontWeight:700,color:C.ac,...mn}}>{fmt(Math.round(cuota))} zł</div></div>
          </div>
          <div style={{marginBottom:8,fontSize:11,color:C.td}}>Progreso: <strong style={{...mn}}>{(paidPct*100).toFixed(1)}%</strong> del principal amortizado</div>
          <div style={{height:22,borderRadius:11,overflow:"hidden",display:"flex",background:C.bg}}>
            <div style={{width:`${(paidPct*100).toFixed(1)}%`,background:`linear-gradient(90deg,${C.gn},#22c55e)`,transition:"width .3s",display:"flex",alignItems:"center",justifyContent:"center"}}>{paidPct>0.05&&<span style={{fontSize:9,color:C.w,fontWeight:600}}>{(paidPct*100).toFixed(1)}%</span>}</div>
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:9,color:C.tm}}>{(100-paidPct*100).toFixed(1)}% restante</span></div>
          </div>
        </Cd>

        <Cd style={{marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <ST icon="📈" sub="Principal acumulado vs Intereses acumulados">Principal vs Intereses</ST>
          {(()=>{
            const W=900,H=220,pL=60,pR=20,pT=16,pB=28,cW=W-pL-pR,cH=H-pT-pB;
            const maxV=Math.max(yearlyData[yearlyData.length-1]?.cumP||1,yearlyData[yearlyData.length-1]?.cumI||1)*1.05;
            const xP=i=>pL+(i/(yearlyData.length-1||1))*cW;
            const yP=v=>pT+cH-(v/maxV)*cH;
            const mkD=(arr,key)=>arr.map((d,i)=>`${i===0?"M":"L"}${xP(i)} ${yP(d[key])}`).join(" ");
            const mkArea=(key,col)=>{const line=mkD(yearlyData,key);return line+`L${xP(yearlyData.length-1)} ${pT+cH}L${xP(0)} ${pT+cH}Z`;};
            const yTicks=Array.from({length:5},(_,i)=>maxV*i/4);
            const xStep=Math.max(1,Math.floor(yearlyData.length/15));
            return<svg viewBox={`0 0 ${W} ${H}`} style={{display:"block",width:"100%",height:"auto"}}>
              {yTicks.map((v,i)=><g key={i}><line x1={pL} y1={yP(v)} x2={W-pR} y2={yP(v)} stroke={C.bd} strokeWidth={.5} strokeDasharray="3 3"/><text x={pL-6} y={yP(v)+4} textAnchor="end" fill={C.tm} fontSize={8} {...mn}>{fmt(Math.round(v/1000))}k</text></g>)}
              <path d={mkArea("cumP")} fill={C.gn} opacity={.15}/>
              <path d={mkArea("cumI")} fill={C.rd} opacity={.1}/>
              <path d={mkD(yearlyData,"cumP")} fill="none" stroke={C.gn} strokeWidth={2.5}/>
              <path d={mkD(yearlyData,"cumI")} fill="none" stroke={C.rd} strokeWidth={2.5}/>
              {yearlyData.map((d,i)=>{const show=i%xStep===0||i===yearlyData.length-1;return show?<g key={i}><circle cx={xP(i)} cy={yP(d.cumP)} r={2.5} fill={C.w} stroke={C.gn} strokeWidth={1.5}/><circle cx={xP(i)} cy={yP(d.cumI)} r={2.5} fill={C.w} stroke={C.rd} strokeWidth={1.5}/><text x={xP(i)} y={H-4} textAnchor="middle" fill={C.tm} fontSize={8}>{d.year}</text></g>:null})}
              <text x={xP(yearlyData.length-1)+4} y={yP(yearlyData[yearlyData.length-1]?.cumI||0)+4} fill={C.rd} fontSize={9} {...mn}>{fmt(Math.round(totalInterest))} zł</text>
            </svg>;
          })()}
          <div style={{display:"flex",gap:14,marginTop:8,fontSize:11}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:3,background:C.gn,display:"inline-block"}}></span>Principal</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:14,height:3,background:C.rd,display:"inline-block"}}></span>Intereses</span>
          </div>
        </Cd>
      </>;
    })()}

    {/* What-If Extra Payment */}
    <WhatIfExtraPayment tin={tin} yrs={yrs} amt={amt}/>
  </div>;
}

function WhatIfExtraPayment({tin,yrs,amt}){
  const[extraPay,setExtraPay]=useState(0);
  const ppy=12;
  const ri=tin/100/ppy,np=yrs*ppy;
  const cuotaOrig=ri===0?amt/np:(amt*ri*Math.pow(1+ri,np))/(Math.pow(1+ri,np)-1);
  const origTotalPaid=cuotaOrig*np;
  const origTotalInterest=origTotalPaid-amt;
  const cuotaExtra=cuotaOrig+(extraPay||0);
  let balExtra=amt,monthsExtra=0,totalInterestExtra=0;
  while(balExtra>0.01&&monthsExtra<np*2){
    const intPay=balExtra*ri;
    const prinPay=Math.min(balExtra,cuotaExtra-intPay);
    if(prinPay<=0)break;
    totalInterestExtra+=intPay;
    balExtra-=prinPay;
    monthsExtra++;
  }
  const yearsExtra=Math.ceil(monthsExtra/12*10)/10;
  const origYears=yrs;
  const yearsSaved=Math.max(0,origYears-yearsExtra);
  const interestSaved=Math.max(0,origTotalInterest-totalInterestExtra);
  return<Cd style={{marginTop:16,marginBottom:16}}>
    <ST icon="🔮" sub="Simula pagos extra mensuales">What-If: Pago Extra</ST>
    <div style={{marginBottom:14}}>
      <Lb>Pago extra mensual (zł)</Lb>
      <input type="number" value={extraPay||""} onChange={e=>setExtraPay(Number(e.target.value)||0)} style={{width:160}} placeholder="0"/>
    </div>
    {extraPay>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
      <div style={{padding:10,borderRadius:8,background:C.sa,textAlign:"center",borderLeft:`3px solid ${C.rd}`}}><div style={{fontSize:9,color:C.tm}}>Original</div><div style={{fontSize:14,fontWeight:700,color:C.rd,...mn}}>{origYears} años</div><div style={{fontSize:10,color:C.tm}}>Intereses: {fmt(Math.round(origTotalInterest))} zł</div></div>
      <div style={{padding:10,borderRadius:8,background:C.gd,textAlign:"center",borderLeft:`3px solid ${C.gn}`}}><div style={{fontSize:9,color:C.tm}}>Con extra +{fmt(extraPay)} zł/mes</div><div style={{fontSize:14,fontWeight:700,color:C.gn,...mn}}>{yearsExtra} años</div><div style={{fontSize:10,color:C.tm}}>Intereses: {fmt(Math.round(totalInterestExtra))} zł</div></div>
      <div style={{padding:10,borderRadius:8,background:C.ad,textAlign:"center",borderLeft:`3px solid ${C.ac}`}}><div style={{fontSize:9,color:C.tm}}>Te ahorras</div><div style={{fontSize:14,fontWeight:700,color:C.ac,...mn}}>{yearsSaved.toFixed(1)} años</div><div style={{fontSize:10,color:C.gn,fontWeight:600}}>{fmt(Math.round(interestSaved))} zł</div></div>
    </div>}
    {!extraPay&&<div style={{textAlign:"center",padding:16,color:C.tm,fontSize:12}}>Introduce un pago extra para ver el impacto</div>}
  </Cd>;
}

function M4(){
  const{income:inc,monthlyExp:me,annualExp:ae}=useContext(Ctx);
  const autoI=MO.map((_,m)=>inc.reduce((s,r)=>s+valInc(r,m),0)).reduce((a,b)=>a+b,0);
  const safeMe4=me.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const safeAe4=ae.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const autoE=MO.map((_,m)=>safeMe4.reduce((s,r)=>s+valMe(r,m),0)).reduce((a,b)=>a+b,0)+MO.map((_,m)=>safeAe4.reduce((s,r)=>s+valAe(r,m),0)).reduce((a,b)=>a+b,0);
  const[aI,sAI]=useLocalData("gI",autoI);const[aE,sAE]=useLocalData("gE",autoE);
  const[iP,sIP]=useLocalData("gP",0);const[aR,sAR]=useLocalData("gR",5);
  useEffect(()=>{if(autoI>0)sAI(autoI)},[autoI]);
  useEffect(()=>{if(autoE>0)sAE(autoE)},[autoE]);
  const sav=aI-aE,sr=aI>0?sav/aI:0,r=aR/100;
  const proj=useMemo(()=>{const rows=[];let p=iP;rows.push({y:0,inc:0,exp:0,sav:0,ret:0,cov:0,pat:p});for(let y=1;y<=99;y++){const ret=p*r;const cov=aE>0?ret/aE:0;p+=sav+ret;rows.push({y,inc:aI,exp:aE,sav,ret,cov,pat:p})}return rows},[aI,aE,iP,r,sav]);
  const goT=useMemo(()=>{const rows=[];for(let s=5;s<=95;s+=5){const rt=s/100,exp=aI*(1-rt);if(exp<=0){rows.push({rate:s,yrs:0,me:0});continue}const target=exp/(r||.001);const sv=aI*rt;let p=0,y=0;while(p<target&&y<200){p=p*(1+r)+sv;y++}rows.push({rate:s,yrs:y,me:exp/12})}return rows},[aI,r]);
  const goY=proj.find(p=>p.cov>=1);
  // FIRE calculations
  const fireAnnualExp=aE;
  const fireNumber=fireAnnualExp*25;
  const fireProgress=fireNumber>0?Math.min(iP/fireNumber,1):0;
  const fireYearsToIndep=useMemo(()=>{
    if(sav<=0&&r<=0)return Infinity;
    let p=iP;
    for(let y=1;y<=200;y++){
      p=p*(1+r)+sav;
      if(p>=fireNumber)return y;
    }
    return Infinity;
  },[iP,sav,r,fireNumber]);

  return<div style={{animation:"fadeIn .3s"}}>
    {/* FIRE KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:16}}>
      <Cd style={{textAlign:"center",borderTop:`3px solid ${C.ac}`,padding:16}}>
        <div style={{fontSize:24,marginBottom:6}}>🔥</div>
        <div style={{fontSize:10,color:C.tm,marginBottom:4}}>🔥 Número FIRE (regla 4%)</div>
        <div style={{fontSize:24,fontWeight:700,color:C.ac,...mn}}>{fmt(Math.round(fireNumber))} zł</div>
        <div style={{fontSize:10,color:C.tm,marginTop:4}}>Gastos anuales ({fmt(fireAnnualExp)} zł) × 25</div>
      </Cd>
      <Cd style={{padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><span style={{fontSize:20}}>📊</span><h3 style={{fontSize:14,fontWeight:600}}>% Progreso FIRE</h3></div>
        <div style={{fontSize:28,fontWeight:700,color:fireProgress>=1?C.gn:fireProgress>=0.5?C.am:C.rd,...mn,textAlign:"center",marginBottom:8}}>{(fireProgress*100).toFixed(1)}%</div>
        <div style={{height:22,borderRadius:11,overflow:"hidden",display:"flex",background:C.bg}}>

    </Cd>
