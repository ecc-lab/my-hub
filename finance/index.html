    <Cd style={{overflowX:"auto"}}><ST icon="📊">Proyección</ST>
      <div style={{maxHeight:450,overflowY:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead style={{position:"sticky",top:0,background:C.sf,zIndex:1}}><tr>{["Año","Ingresos","Gastos","Ahorro","Rdto.","% Cubierto","Patrimonio"].map(h=><th key={h} style={{padding:"7px 6px",color:C.tm,fontWeight:500,textAlign:"right",borderBottom:`2px solid ${C.bd}`,fontSize:12}}>{h}</th>)}</tr></thead><tbody>
        {proj.slice(0,60).map((row,i)=>{const isGO=row.cov>=1&&(i===0||proj[i-1].cov<1);return<tr key={i} style={{background:isGO?C.gd:row.cov>=1?"rgba(22,163,74,.02)":"transparent",borderBottom:`1px solid ${C.bg}`}}><td style={{padding:"5px 6px",textAlign:"right",fontWeight:isGO?700:400,color:isGO?C.gn:C.tx,fontSize:12}} title={isGO?"Autosostén: rendimiento cubre gasto":""}>{isGO?`💡 ${row.y}`:row.y}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12}}>{fmt(row.inc)}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12}}>{fmt(row.exp)}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12,color:row.sav>=0?C.gn:C.rd}}>{fmt(row.sav)}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12,color:C.ac}}>{fmt(row.ret)}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12,color:row.cov>=1?C.gn:C.am}}>{row.y===0?"–":(row.cov*100).toFixed(1)+"%"}</td><td style={{padding:"5px 6px",textAlign:"right",...mn,fontSize:12,fontWeight:600,color:C.ac}}>{fmt(row.pat)}</td></tr>})}
      </tbody></table></div>
    </Cd>
  </div>;
}

function M6(){
  const{income:inc,monthlyExp:me,annualExp:ae}=useContext(Ctx);
  const safeMe6=me.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const safeAe6=ae.map(r=>({...r,real:r.real||Array(12).fill(null)}));
  const totalMeY6=MO.map((_,m)=>safeMe6.reduce((s,r)=>s+valMe(r,m),0)).reduce((a,b)=>a+b,0);
  const totalAeY6=MO.map((_,m)=>safeAe6.reduce((s,r)=>s+valAe(r,m),0)).reduce((a,b)=>a+b,0);
  const autoSavM=MO.map((_,m)=>inc.reduce((s,r)=>s+valInc(r,m),0)).reduce((a,b)=>a+b,0)/12-((totalMeY6+totalAeY6)/12);
  const[savedGoal,setSG]=useLocalData("mcGoal",null);
  const[age,sAge]=useLocalData("mcAge",35);const[retAge,sRet]=useLocalData("mcRetAge",65);const[lifeExp,sLife]=useLocalData("mcLifeExp",90);
  const[assets2026]=useLocalData("assets",D_AS);const[debts2026]=useLocalData("debts",D_DB);
  const[mcExclIliq,setMcExclIliq]=useLocalData("mcExclIliq",false);
  const autoPat=useMemo(()=>{const maxIdx=Math.max(...assets2026.map(a=>(a.values?.length||0)-1),...debts2026.map(d=>(d.values?.length||0)-1),0);for(let i=maxIdx;i>=0;i--){const tA=assets2026.filter(a=>!mcExclIliq||(a.type==="efectivo"||a.type==="inversión")).reduce((s,a)=>s+(a.values?.[i]||0),0);const tD=debts2026.reduce((s,d)=>s+(d.values?.[i]||0),0);const net=tA-tD;if(net>0)return net}return 0},[assets2026,debts2026,mcExclIliq]);
  const[initP,sInit]=useLocalData("mcInitP",0);const[mContr,sMC]=useLocalData("mcContr",0);
  const[mWith,sMW]=useLocalData("mcWith",1500);const[meanR,sMR]=useLocalData("mcMeanR",7);const[vol,sVol]=useLocalData("mcVol",15);
  const[nSims,sNS]=useState(300);const[res,setRes]=useState(null);const[running,sRun]=useState(false);
  const[adjInf,setInf]=useLocalData("mcInf",false);const[infRate,sInfR]=useLocalData("mcInfR",2.5);
  const[events,setEv]=useLocalData("mcEvents",[]);
  useEffect(()=>{if(autoSavM>0&&mContr===0)sMC(Math.max(0,Math.round(autoSavM)))},[autoSavM]);
  useEffect(()=>{if(autoPat>0&&initP===0)sInit(autoPat)},[autoPat]);
  const rN=()=>{let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)};
  const addEv=()=>setEv([...events,{name:"Compra casa",age:40,amount:50000}]);
  const updEv=(i,f,v)=>{const n=[...events];n[i]={...n[i],[f]:f==="name"?v:Number(v)||0};setEv(n)};
  const delEv=(i)=>{const n=[...events];n.splice(i,1);setEv(n)};

  const run=()=>{sRun(true);setTimeout(()=>{
    const accY=Math.max(0,retAge-age),distY=Math.max(0,lifeExp-retAge),totY=accY+distY;
    const realR=adjInf?meanR-infRate:meanR;const mu=realR/100,sig=vol/100;
    const annC=mContr*12,annW=mWith*12;
    const paths=[],finals=[],retVals=[];let ruin=0;
    const evMap={};events.forEach(ev=>{const yr=ev.age-age;if(yr>=0&&yr<=totY)evMap[yr]=(evMap[yr]||0)+ev.amount});
    const detPath=[initP];let dp=initP;
    for(let y=0;y<accY;y++){dp=dp*(1+mu)+annC-(evMap[y+1]||0);detPath.push(Math.max(0,dp))}
    for(let y=0;y<distY;y++){dp=dp*(1+mu)-annW-(evMap[accY+y+1]||0);detPath.push(Math.max(0,dp))}
    for(let s=0;s<nSims;s++){let p=initP;const path=[p];let ruined=false;
      for(let y=0;y<accY;y++){p=Math.max(0,p*(1+mu+sig*rN())+annC-(evMap[y+1]||0));path.push(p)}
      retVals.push(p);
      for(let y=0;y<distY;y++){p=p*(1+mu+sig*rN())-annW-(evMap[accY+y+1]||0);if(p<0){p=0;if(!ruined){ruined=true;ruin++}}path.push(p)}
      paths.push(path);finals.push(p)}
    const pcts=[10,25,50,75,90],bands={};pcts.forEach(p=>bands[p]=[]);
    for(let y=0;y<=totY;y++){const vals=paths.map(p=>p[Math.min(y,p.length-1)]).sort((a,b)=>a-b);pcts.forEach(p=>{bands[p].push(vals[Math.max(0,Math.floor(vals.length*p/100)-1)])})}
    retVals.sort((a,b)=>a-b);finals.sort((a,b)=>a-b);
    setRes({bands,paths:paths.slice(0,40),totY,accY,detPath,
      retMed:retVals[Math.floor(retVals.length*.5)],retP10:retVals[Math.floor(retVals.length*.1)],retP90:retVals[Math.floor(retVals.length*.9)],
      surv:((nSims-ruin)/nSims*100).toFixed(1),finalMed:finals[Math.floor(finals.length*.5)],ruin});
    sRun(false)},80)};

  const MCChart=({r,width=720,height=380})=>{
    if(!r)return null;const{bands,totY,accY,detPath}=r;
    const allVals=[...bands[90],...detPath];const allMax=Math.max(...allVals)*1.05;const allMin=1000;
    const pX=65,pY=18,cW=width-pX-20,cH=height-pY-32;
    const xP=i=>pX+(i/totY)*cW;
    const yP=v=>{const c=Math.max(v,allMin);return pY+cH-(c-allMin)/(allMax-allMin||1)*cH};
    const fmtY=v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?Math.round(v/1e3)+"k":Math.round(v);
    const yLabs=Array.from({length:6},(_,i)=>allMin+(allMax-allMin)*i/5);
    const mkA=(lo,hi,col,op)=>{const t=bands[hi],b=bands[lo];return<path d={t.map((v,i)=>`${i===0?"M":"L"}${xP(i)} ${yP(v)}`).join("")+b.slice().reverse().map((v,i)=>`L${xP(totY-i)} ${yP(v)}`).join("")+"Z"} fill={col} opacity={op}/>};
    return<svg viewBox={`0 0 ${width} ${height}`} style={{display:"block",width:"100%",height:"auto"}}>
      {yLabs.map(v=><g key={v}><line x1={pX} y1={yP(v)} x2={width-20} y2={yP(v)} stroke={C.bd} strokeWidth={.5} strokeDasharray="3 3"/><text x={pX-6} y={yP(v)+4} textAnchor="end" fill={C.tm} fontSize={9} {...mn}>{fmtY(v)}zł</text></g>)}
      <line x1={xP(accY)} y1={pY} x2={xP(accY)} y2={pY+cH} stroke={C.am} strokeWidth={1.5} strokeDasharray="5 3"/>
      <text x={xP(accY)+4} y={pY+13} fill={C.am} fontSize={10} fontWeight={600}>Jubilación</text>
      {mkA(10,90,"#0ea5e9",.06)}{mkA(25,75,"#0ea5e9",.12)}
      <path d={detPath.map((v,i)=>`${i===0?"M":"L"}${xP(i)} ${yP(v)}`).join("")} fill="none" stroke={C.am} strokeWidth={2} strokeDasharray="8 4" opacity={.8}/>
      <path d={bands[50].map((v,i)=>`${i===0?"M":"L"}${xP(i)} ${yP(v)}`).join("")} fill="none" stroke={C.ac} strokeWidth={2.5} strokeLinecap="round"/>
      {Array.from({length:Math.min(totY+1,12)},(_,i)=>Math.round(i*totY/11)).map(yr=><text key={yr} x={xP(yr)} y={height-5} textAnchor="middle" fill={C.tm} fontSize={9}>{age+yr}</text>)}
    </svg>};

  return<div style={{animation:"fadeIn .3s"}}>
    <div style={{padding:"10px 14px",borderRadius:8,background:C.ad,border:`1px solid ${C.ac30}`,marginBottom:14,fontSize:12,color:C.td,lineHeight:1.6}}>
      <strong style={{color:C.ac}}>💡 Planifica tu jubilación con datos reales.</strong> Pon cuánto aportas y necesitarás. Añade gastos puntuales y activa la inflación para realismo.
    </div>
    <Cd style={{marginBottom:16}}>
      <ST icon="🎯">Planificador de Jubilación</ST>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:14}}>
        <div><Lb>Edad Actual</Lb><input type="number" value={age} onChange={e=>sAge(Number(e.target.value)||0)}/></div>
        <div><Lb>Edad Jubilación</Lb><input type="number" value={retAge} onChange={e=>sRet(Number(e.target.value)||0)}/></div>
        <div><Lb>Esperanza de Vida</Lb><input type="number" value={lifeExp} onChange={e=>sLife(Number(e.target.value)||0)}/></div>
        <div><Lb>Patrimonio Actual (zł)</Lb><input type="number" value={initP} onChange={e=>sInit(Number(e.target.value)||0)}/><div style={{display:"flex",alignItems:"center",gap:6,marginTop:5,cursor:"pointer"}} onClick={()=>{const next=!mcExclIliq;setMcExclIliq(next)}}><span style={{fontSize:14}}>{mcExclIliq?"✅":"⬜"}</span><span style={{fontSize:10,color:C.td}}>Excluir ilíquidos (pasivo/otro)</span></div></div>
        <div><Lb>Aportación Mensual (zł)</Lb><div style={{display:"flex",gap:6}}><input type="number" value={mContr} onChange={e=>sMC(Number(e.target.value)||0)} style={{flex:1}}/><button onClick={()=>sMC(Math.max(0,Math.round(autoSavM)))} title="Sincronizar ahorro desde mis datos" style={{padding:"0 10px",borderRadius:7,border:`1px solid ${C.ac}`,background:C.ad,color:C.ac,cursor:"pointer",fontSize:13,whiteSpace:"nowrap",fontFamily:"'Inter',sans-serif"}}>🔄</button></div></div>
        <div><Lb>Retirada Mensual Jub. (zł)</Lb><input type="number" value={mWith} onChange={e=>sMW(Number(e.target.value)||0)}/></div>
        <div><Lb>Rendimiento Medio (%)</Lb><input type="number" value={meanR} onChange={e=>sMR(Number(e.target.value)||0)} step="0.1"/></div>
        <div><Lb>Volatilidad (%)</Lb><input type="number" value={vol} onChange={e=>sVol(Number(e.target.value)||0)} step="0.1"/></div>
        <div><Lb>Nº Simulaciones</Lb><input type="number" value={nSims} onChange={e=>sNS(Math.min(1000,Math.max(50,Number(e.target.value)||100)))}/></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginTop:14,padding:"10px 12px",borderRadius:8,background:adjInf?C.amd:C.sa,border:`1px solid ${adjInf?C.am:C.bd}`,cursor:"pointer"}} onClick={()=>setInf(!adjInf)}>
        <span style={{fontSize:18}}>{adjInf?"✅":"⬜"}</span>
        <div><span style={{fontSize:12,fontWeight:600,color:adjInf?C.am:C.td}}>Ajustar por inflación</span></div>
        {adjInf&&<input type="number" value={infRate} onChange={e=>{e.stopPropagation();sInfR(Number(e.target.value)||0)}} onClick={e=>e.stopPropagation()} step="0.1" style={{width:60,fontSize:12}}/>}
        {adjInf&&<span style={{fontSize:11,color:C.am}}>% anual</span>}
      </div>
      <div style={{marginTop:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:600,color:C.td}}>📌 Gastos puntuales</span><Ab onClick={addEv}/></div>
        {events.map((ev,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
          <input type="text" value={ev.name} onChange={e=>updEv(i,"name",e.target.value)} style={{width:140,fontSize:12}}/>
          <div style={{display:"flex",alignItems:"center",gap:4}}><Lb>Edad</Lb><input type="number" value={ev.age} onChange={e=>updEv(i,"age",e.target.value)} style={{width:55}}/></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><Lb>zł</Lb><input type="number" value={ev.amount} onChange={e=>updEv(i,"amount",e.target.value)} style={{width:80}}/></div>
          <Xb onClick={()=>delEv(i)}/>
        </div>)}
      </div>
      <div style={{marginTop:18,display:"flex",gap:10,flexWrap:"wrap"}}>
        <PB onClick={run} disabled={running}>{running?"⏳ Simulando...":"🎲 Simular Jubilación"}</PB>
        {res&&<Bt onClick={()=>setSG({date:new Date().toLocaleDateString("pl-PL"),retMed:res.retMed,surv:res.surv,mContr,mWith,age,retAge,lifeExp,meanR,vol})} style={{background:"rgba(124,58,237,0.08)",borderColor:C.pu,color:C.pu}}>💾 Guardar Objetivo</Bt>}
        {savedGoal&&<span style={{fontSize:11,color:C.pu,alignSelf:"center"}}>Guardado: {savedGoal.date}</span>}
      </div>
    </Cd>
    {res?<>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:16}}>
        {[{l:`A los ${retAge}`,v:`${fmt(res.retMed)} zł`,c:C.ac,s:"Mediana"},{l:"Pesimista (P10)",v:`${fmt(res.retP10)} zł`,c:C.rd,s:"Percentil 10"},{l:"Optimista (P90)",v:`${fmt(res.retP90)} zł`,c:C.gn,s:"Percentil 90"},{l:"Supervivencia",v:`${res.surv}%`,c:Number(res.surv)>=90?C.gn:C.am,s:`${nSims-res.ruin}/${nSims}`},{l:`A los ${lifeExp}`,v:`${fmt(res.finalMed)} zł`,c:res.finalMed>0?C.gn:C.rd,s:"Mediana"}].map((x,i)=><Cd key={i} style={{textAlign:"center",borderTop:`3px solid ${x.c}`,padding:14}}><div style={{fontSize:10,color:C.tm}}>{x.l}</div><div style={{fontSize:18,fontWeight:700,color:x.c,...mn,marginTop:4}}>{x.v}</div><div style={{fontSize:9,color:C.tm,marginTop:2}}>{x.s}</div></Cd>)}
      </div>
      <Cd style={{marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <ST icon="📈">Proyección ({nSims} simulaciones)</ST>
        <MCChart r={res}/>
      </Cd>
    </>:<Cd style={{textAlign:"center",padding:50}}><div style={{fontSize:56,marginBottom:14}}>🎲</div><p style={{color:C.td,fontSize:14}}>Configura y pulsa "Simular Jubilación"</p></Cd>}
  </div>;
}

  const totalMeY7=MO.map((_,m)=>safeMe7.reduce((s,rr)=>s+valMe(rr,m),0)).reduce((a,b)=>a+b,0);
  const totalAeY7=MO.map((_,m)=>safeAe7.reduce((s,rr)=>s+valAe(rr,m),0)).reduce((a,b)=>a+b,0);
  const autoSavM=MO.map((_,m)=>inc.reduce((s,rr)=>s+valInc(rr,m),0)).reduce((a,b)=>a+b,0)/12-((totalMeY7+totalAeY7)/12);
  const loadFromData=()=>{if(autoPat>0)sCP(autoPat);if(autoSavM>0)sAA(Math.round(autoSavM*12))};

  const yrsToRet=Math.max(0,retAge-age);const yrsInRet=Math.max(0,lifeExp-retAge);
  const realRetReturn=adjInf?Math.max(0,retReturn-infRate):retReturn;const rr=realRetReturn/100;
  const annualNeed=monthlyNeed*12;
  const targetPat=rr>0?annualNeed*((1-Math.pow(1+rr,-yrsInRet))/rr):annualNeed*yrsInRet;
  const neededGrowth=useMemo(()=>{if(yrsToRet<=0)return 0;for(let g=0;g<=25;g+=0.1){const rate=g/100;const fv=currentPat*Math.pow(1+rate,yrsToRet)+(annualAccum>0&&rate>0?annualAccum*(Math.pow(1+rate,yrsToRet)-1)/rate:annualAccum*yrsToRet);if(fv>=targetPat)return g}return 99},[currentPat,annualAccum,yrsToRet,targetPat]);

  const chartData=useMemo(()=>{
    const g=neededGrowth<99?neededGrowth/100:0.05;const points=[];let p=currentPat;
    points.push({age,pat:p,phase:"acum"});
    for(let y=1;y<=yrsToRet;y++){p=p*(1+g)+annualAccum;points.push({age:age+y,pat:Math.round(p),phase:"acum"})}
    for(let y=1;y<=yrsInRet;y++){p=p*(1+rr)-annualNeed;points.push({age:retAge+y,pat:Math.max(0,Math.round(p)),phase:"ret"})}
    return points;
  },[age,retAge,lifeExp,currentPat,annualAccum,neededGrowth,rr,annualNeed,yrsToRet,yrsInRet]);

  const PlanChart=({width=900,height=280})=>{
    if(chartData.length<2)return null;
    const vals=chartData.map(d=>d.pat);const mx=Math.max(...vals)*1.05;const mi=0;const rgY=mx-mi||1;
    const pX=60,pY=14,cW=width-pX-20,cH=height-pY-34;
    const pts=chartData.map((d,i)=>({x:pX+(i/(chartData.length-1))*cW,y:pY+cH-((d.pat-mi)/rgY)*cH,phase:d.phase}));
    const acumPts=pts.filter(p=>p.phase==="acum");
    const retPts=pts.filter((_,i)=>chartData[i].phase==="ret"||i===acumPts.length-1);
    const mkD=ps=>ps.map((p,i)=>`${i===0?"M":"L"}${p.x} ${p.y}`).join(" ");
    const fmtY=v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?Math.round(v/1e3)+"k":Math.round(v);
    const yLabs=Array.from({length:6},(_,i)=>mi+(mx-mi)*i/5);
    const retLine=acumPts.length>0?acumPts[acumPts.length-1]:null;
    const xStep=Math.max(1,Math.floor(chartData.length/15));
    return<svg viewBox={`0 0 ${width} ${height}`} style={{display:"block",width:"100%",height:"auto"}}>
      <defs><linearGradient id="m7g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gn} stopOpacity=".12"/><stop offset="100%" stopColor={C.gn} stopOpacity="0"/></linearGradient><linearGradient id="m7r" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.rd} stopOpacity=".08"/><stop offset="100%" stopColor={C.rd} stopOpacity="0"/></linearGradient></defs>
      {yLabs.map(v=><g key={v}><line x1={pX} y1={pY+cH-((v-mi)/rgY)*cH} x2={width-20} y2={pY+cH-((v-mi)/rgY)*cH} stroke={C.bd} strokeWidth={.5} strokeDasharray="3 3"/><text x={pX-6} y={pY+cH-((v-mi)/rgY)*cH+4} textAnchor="end" fill={C.tm} fontSize={9} {...mn}>{fmtY(v)}zł</text></g>)}
      {retLine&&<><line x1={retLine.x} y1={pY} x2={retLine.x} y2={pY+cH} stroke={C.am} strokeWidth={1.5} strokeDasharray="5 3"/><text x={retLine.x+4} y={pY+12} fill={C.am} fontSize={9} fontWeight={600}>Jubilación ({retAge})</text></>}
      <line x1={pX} y1={pY+cH-((targetPat-mi)/rgY)*cH} x2={width-20} y2={pY+cH-((targetPat-mi)/rgY)*cH} stroke={C.ac} strokeWidth={1} strokeDasharray="6 3" opacity={.5}/>
      {acumPts.length>1&&<><path d={mkD(acumPts)+`L${acumPts[acumPts.length-1].x} ${pY+cH}L${acumPts[0].x} ${pY+cH}Z`} fill="url(#m7g)"/><path d={mkD(acumPts)} fill="none" stroke={C.gn} strokeWidth={2.5}/></>}
      {retPts.length>1&&<><path d={mkD(retPts)+`L${retPts[retPts.length-1].x} ${pY+cH}L${retPts[0].x} ${pY+cH}Z`} fill="url(#m7r)"/><path d={mkD(retPts)} fill="none" stroke={C.rd} strokeWidth={2.5}/></>}
      {pts.map((p,i)=>{const show=i%xStep===0||i===acumPts.length-1||i===pts.length-1;return show?<g key={i}><circle cx={p.x} cy={p.y} r={3} fill={C.w} stroke={p.phase==="acum"?C.gn:C.rd} strokeWidth={2}/><text x={p.x} y={height-4} textAnchor="middle" fill={C.tm} fontSize={8}>{chartData[i].age}</text></g>:null})}
    </svg>
  };

  const totalGap=Math.max(0,targetPat-currentPat);
  const annualIncNeeded=yrsToRet>0?totalGap/yrsToRet:totalGap;
  const onTrack=annualAccum>=annualIncNeeded;
  const pctCovered=annualIncNeeded>0?annualAccum/annualIncNeeded:1;

  return<div style={{animation:"fadeIn .3s"}}>
    <div style={{padding:"10px 14px",borderRadius:8,background:C.ad,border:`1px solid ${C.ac30}`,marginBottom:14,fontSize:12,color:C.td,lineHeight:1.6}}>
      <strong style={{color:C.ac}}>💡 ¿Cuánto necesitas para jubilarte?</strong> Edad, jubilación, acumulación anual y gasto mensual. Te decimos si vas bien encaminado.
    </div>
    <Cd style={{marginBottom:16}}>
      <ST icon="⚙️">Tus Datos</ST>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14}}>
        <div><Lb>Edad Actual</Lb><input type="number" value={age} onChange={e=>sAge(Number(e.target.value)||0)}/></div>
        <div><Lb>Edad Jubilación</Lb><input type="number" value={retAge} onChange={e=>sRetAge(Number(e.target.value)||0)}/></div>
        <div><Lb>Esperanza de Vida</Lb><input type="number" value={lifeExp} onChange={e=>sLifeExp(Number(e.target.value)||0)}/></div>
        <div><Lb>Patrimonio Actual (zł)</Lb><input type="number" value={currentPat} onChange={e=>sCP(Number(e.target.value)||0)}/></div>
        <div><Lb>Acumulación Anual (zł)</Lb><input type="number" value={annualAccum} onChange={e=>sAA(Number(e.target.value)||0)}/></div>
        <div><Lb>Gasto Mensual Jub. (zł)</Lb><input type="number" value={monthlyNeed} onChange={e=>sMN(Number(e.target.value)||0)}/></div>
        <div><Lb>Rendimiento Jub. (%)</Lb><input type="number" value={retReturn} onChange={e=>sRR(Number(e.target.value)||0)} step="0.5"/></div>
      </div>
      <div style={{marginTop:10}}><button onClick={loadFromData} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${C.ac}`,background:C.ad,color:C.ac,fontSize:11,cursor:"pointer",fontFamily:"'Inter',sans-serif",fontWeight:600}}>🔄 Cargar desde mis datos</button></div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginTop:14,padding:"10px 12px",borderRadius:8,background:adjInf?C.amd:C.sa,border:`1px solid ${adjInf?C.am:C.bd}`,cursor:"pointer"}} onClick={()=>setInf(!adjInf)}>
        <span style={{fontSize:18}}>{adjInf?"✅":"⬜"}</span>
        <div><span style={{fontSize:12,fontWeight:600,color:adjInf?C.am:C.td}}>Ajustar por inflación</span></div>
        {adjInf&&<input type="number" value={infRate} onChange={e=>{e.stopPropagation();sInfR(Number(e.target.value)||0)}} onClick={e=>e.stopPropagation()} step="0.5" style={{width:60,fontSize:12}}/>}
      </div>
      <div style={{marginTop:14}}>
        <Bt onClick={()=>setSavedPlan({date:new Date().toLocaleDateString("pl-PL"),targetPat:Math.round(targetPat),neededGrowth})} style={{background:"rgba(124,58,237,0.08)",borderColor:C.pu,color:C.pu}}>💾 Guardar escenario</Bt>
        {savedPlan&&<span style={{fontSize:11,color:C.pu,marginLeft:10}}>Guardado: {savedPlan.date}</span>}
      </div>
    </Cd>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:16}}>
      <Cd style={{textAlign:"center",borderTop:`3px solid ${C.ac}`,padding:14}}><div style={{fontSize:20}}>🏦</div><div style={{fontSize:10,color:C.tm}}>Necesitas a los {retAge}</div><div style={{fontSize:20,fontWeight:700,color:C.ac,...mn}}>{fmt(Math.round(targetPat))} zł</div></Cd>
      <Cd style={{textAlign:"center",borderTop:`3px solid ${C.bl}`,padding:14}}><div style={{fontSize:20}}>📈</div><div style={{fontSize:10,color:C.tm}}>Aumento anual nec.</div><div style={{fontSize:20,fontWeight:700,color:C.bl,...mn}}>{fmt(Math.round(annualIncNeeded))} zł</div></Cd>
      <Cd style={{textAlign:"center",borderTop:`3px solid ${onTrack?C.gn:C.am}`,padding:14}}><div style={{fontSize:20}}>🎯</div><div style={{fontSize:10,color:C.tm}}>Tu ritmo</div><div style={{fontSize:20,fontWeight:700,color:onTrack?C.gn:C.am,...mn}}>{(pctCovered*100).toFixed(0)}%</div></Cd>
      <Cd style={{textAlign:"center",borderTop:`3px solid ${neededGrowth<=5?C.gn:neededGrowth<=8?C.am:C.rd}`,padding:14}}><div style={{fontSize:20}}>📊</div><div style={{fontSize:10,color:C.tm}}>Crecimiento nec.</div><div style={{fontSize:20,fontWeight:700,color:neededGrowth<=5?C.gn:neededGrowth<=8?C.am:C.rd,...mn}}>{neededGrowth>=99?"∞":neededGrowth.toFixed(1)+"%"}</div></Cd>
    </div>

    <Cd style={{marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 12px"}}>
      <ST icon="📈">Evolución de tu Patrimonio</ST>
      <PlanChart/>
      <div style={{display:"flex",gap:14,marginTop:8,fontSize:10}}>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:16,height:3,background:C.gn,display:"inline-block"}}></span>Acumulación</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:16,height:3,background:C.rd,display:"inline-block"}}></span>Jubilación</span>
        <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:16,height:2,borderTop:`2px dashed ${C.ac}`,display:"inline-block"}}></span><span style={{color:C.ac}}>Objetivo</span></span>
      </div>
    </Cd>
  </div>;
}

// ============ M8: Salud del Sistema ============
function M8(){
  const[incHist]=useLocalData("incomeHistory",{});
  const[meHist]=useLocalData("meHistory",{});
  const[aeHist]=useLocalData("aeHistory",{});

  const sources=useMemo(()=>{
    const now=new Date();
    const check=(hist,label)=>{
      const years=Object.keys(hist).map(Number).filter(y=>y>0).sort((a,b)=>b-a);
      let lastMonth=null,lastYear=null;
      for(const y of years){
        const rows=hist[y]||[];
        for(let m=11;m>=0;m--){
          const hasData=rows.some(r=>{
            if(r.amounts)return(r.amounts[m]||0)!==0;
            if(r.real){const rv=r.real[m];if(rv!=null&&rv!==0)return true;}
            if(r.monthly&&r.monthly>0)return true;
            if(r.annual&&r.annual>0)return true;
            return false;
          });
          if(hasData){lastMonth=m;lastYear=y;break;}
        }
        if(lastYear)break;
      }
      if(!lastYear)return{name:label,lastDate:null,daysSince:Infinity};
      const lastDate=new Date(lastYear,lastMonth+1,0);
      const daysSince=Math.floor((now-lastDate)/(1000*60*60*24));
      return{name:label,lastDate:`${MO[lastMonth]} ${lastYear}`,daysSince};
    };
    return[
      check(incHist,"Ingresos"),
      check(meHist,"Gastos Mensuales"),
      check(aeHist,"Gastos Anuales")
    ];
  },[incHist,meHist,aeHist]);

  const upToDate=sources.filter(s=>s.daysSince<30).length;
  const total=sources.length;
  const statusColor=(days)=>days<30?C.gn:days<90?C.am:C.rd;
  const statusLabel=(days)=>days<30?"OK":days<90?"Revisar":"Desactualizado";
  const allHealthy=upToDate===total;

  return<div style={{animation:"fadeIn .3s"}}>
    <div style={{padding:"10px 14px",borderRadius:8,background:C.ad,border:`1px solid ${C.ac30}`,marginBottom:14,fontSize:12,color:C.td,lineHeight:1.6}}>
      <strong style={{color:C.ac}}>🩺 Salud de tus datos.</strong> Comprueba si tus fuentes de datos están actualizadas. Verde = al día, ámbar = pendiente de revisar, rojo = desactualizado.
    </div>

    <Cd style={{marginBottom:16,textAlign:"center",padding:20}}>
      <div style={{fontSize:48,marginBottom:10}}>{allHealthy?"✅":"⚠️"}</div>
      <div style={{fontSize:20,fontWeight:700,color:allHealthy?C.gn:C.am,...mn}}>{upToDate} de {total}</div>
      <div style={{fontSize:12,color:C.td,marginTop:4}}>fuentes de datos al día (&lt;30 días)</div>
    </Cd>

    <Cd style={{marginBottom:16}}>
      <ST icon="📋">Último mes con datos</ST>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr>
          <th style={{...th,textAlign:"left"}}>Fuente</th>
          <th style={th}>Último mes</th>
          <th style={th}>Días desde actualización</th>
          <th style={th}>Estado</th>
        </tr></thead>
        <tbody>
          {sources.map((s,i)=>{const clr=statusColor(s.daysSince);return<tr key={i} style={{borderBottom:`1px solid ${C.bg}`}}>
            <td style={{padding:"8px 6px",fontWeight:600}}>{s.name}</td>
            <td style={{padding:"8px 6px",textAlign:"right",...mn}}>{s.lastDate||"Sin datos"}</td>
            <td style={{padding:"8px 6px",textAlign:"right",...mn,color:clr}}>{isFinite(s.daysSince)?`${s.daysSince} días`:"—"}</td>
            <td style={{padding:"6px"}}><span style={{display:"inline-block",padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:600,color:clr,background:clr===C.gn?C.gd:clr===C.am?C.amd:C.rdd}}>{isFinite(s.daysSince)?statusLabel(s.daysSince):"Sin datos"}</span></td>
          </tr>})}
        </tbody>
      </table>
    </Cd>
  </div>;
}

// ============ APP ============
function App(){
  const[tab,sTab]=useState("m0");
  const CY=new Date().getFullYear();const YEARS=Array.from({length:CY-2023+2},(_,i)=>2023+i);

  const[meRows,sMeRows]=useLocalData("meRows",D_M.map(r=>({name:r.name,type:r.type||"Otros"})));
  const[aeRows,sAeRows]=useLocalData("aeRows",D_A.map(r=>({name:r.name,type:r.type||"Otros"})));

  const income=useMemo(()=>{
    const raw=incHist[selYear]||[];
    return incRows.map((tmpl,i)=>{const src=raw[i]||{};return{...tmpl,base:src.base!=null?src.base:null,amounts:src.amounts||Array(12).fill(0)}});
  },[incRows,incHist,selYear]);

  },[aeRows,aeHist,selYear]);
  const sg=sgHist[selYear]||400;

  const sI=v=>sIH({...incHist,[selYear]:v.map(r=>({name:r.name,type:r.type,base:r.base,amounts:r.amounts}))});
  const sM=v=>sMH({...meHist,[selYear]:v.map(r=>({name:r.name,type:r.type,monthly:r.monthly,real:r.real}))});
  const sA=v=>sAH({...aeHist,[selYear]:v.map(r=>({name:r.name,type:r.type,annual:r.annual,real:r.real}))});
  const sSG=v=>sSGH({...sgHist,[selYear]:v});

  const addIncRow=(row)=>{sIncRows([...incRows,{name:row.name,type:row.type||"Otros"}]);const h={...incHist};YEARS.forEach(y=>{const arr=h[y]||[];h[y]=[...arr,{name:row.name,type:row.type,base:0,amounts:y===selYear?row.amounts:Array(12).fill(0)}]});sIH(h)};
  const delIncRow=(idx)=>{const removedMeta=incRows[idx];const removedData={};YEARS.forEach(y=>{if(incHist[y]?.[idx])removedData[y]=incHist[y][idx]});sIncRows(incRows.filter((_,i)=>i!==idx));const h={...incHist};YEARS.forEach(y=>{if(h[y])h[y]=h[y].filter((_,i)=>i!==idx)});sIH(h);toast.undoable(`"${removedMeta?.name||"Ingreso"}" eliminado`,()=>{const nr=[...incRows];nr.splice(idx,0,removedMeta);sIncRows(nr);const hh={...incHist};YEARS.forEach(y=>{if(hh[y]){const arr=[...hh[y]];arr.splice(idx,0,removedData[y]||{name:removedMeta.name,type:removedMeta.type,base:null,amounts:Array(12).fill(0)});hh[y]=arr}});sIH(hh)})};
  const addMeRow=(row)=>{sMeRows([...meRows,{name:row.name,type:row.type||"Otros"}]);const h={...meHist};YEARS.forEach(y=>{const arr=h[y]||[];h[y]=[...arr,{name:row.name,type:row.type,monthly:y===selYear?row.monthly:0,real:Array(12).fill(null)}]});sMH(h)};
  const delMeRow=(idx)=>{const removedMeta=meRows[idx];const removedData={};YEARS.forEach(y=>{if(meHist[y]?.[idx])removedData[y]=meHist[y][idx]});sMeRows(meRows.filter((_,i)=>i!==idx));const h={...meHist};YEARS.forEach(y=>{if(h[y])h[y]=h[y].filter((_,i)=>i!==idx)});sMH(h);toast.undoable(`"${removedMeta?.name||"Gasto"}" eliminado`,()=>{const nr=[...meRows];nr.splice(idx,0,removedMeta);sMeRows(nr);const hh={...meHist};YEARS.forEach(y=>{if(hh[y]){const arr=[...hh[y]];arr.splice(idx,0,removedData[y]||{name:removedMeta.name,type:removedMeta.type,monthly:0,real:Array(12).fill(null)});hh[y]=arr}});sMH(hh)})};
  const addAeRow=(row)=>{sAeRows([...aeRows,{name:row.name,type:row.type||"Otros"}]);const h={...aeHist};YEARS.forEach(y=>{const arr=h[y]||[];h[y]=[...arr,{name:row.name,type:row.type,annual:y===selYear?row.annual:0}]});sAH(h)};
  const delAeRow=(idx)=>{const removedMeta=aeRows[idx];const removedData={};YEARS.forEach(y=>{if(aeHist[y]?.[idx])removedData[y]=aeHist[y][idx]});sAeRows(aeRows.filter((_,i)=>i!==idx));const h={...aeHist};YEARS.forEach(y=>{if(h[y])h[y]=h[y].filter((_,i)=>i!==idx)});sAH(h);toast.undoable(`"${removedMeta?.name||"Gasto anual"}" eliminado`,()=>{const nr=[...aeRows];nr.splice(idx,0,removedMeta);sAeRows(nr);const hh={...aeHist};YEARS.forEach(y=>{if(hh[y]){const arr=[...hh[y]];arr.splice(idx,0,removedData[y]||{name:removedMeta.name,type:removedMeta.type,annual:0,real:Array(12).fill(null)});hh[y]=arr}});sAH(hh)})};
  const syncIncMeta=(idx,field,val)=>{const nr=[...incRows];nr[idx]={...nr[idx],[field]:val};sIncRows(nr);const h={...incHist};YEARS.forEach(y=>{if(h[y]&&h[y][idx])h[y]=[...h[y]].map((r,i)=>i===idx?{...r,[field]:val}:r)});sIH(h)};

  const reorderInc=(fromIdx,toIdx)=>{const nr=[...incRows];const[m]=nr.splice(fromIdx,1);nr.splice(toIdx,0,m);sIncRows(nr);const h={...incHist,[selYear]:incHist[selYear]||income};YEARS.forEach(y=>{if(h[y]&&h[y].length>Math.max(fromIdx,toIdx)){const arr=[...h[y]];const[mv]=arr.splice(fromIdx,1);arr.splice(toIdx,0,mv);h[y]=arr}});sIH(h)};
  const reorderMe=(fromIdx,toIdx)=>{const nr=[...meRows];const[m]=nr.splice(fromIdx,1);nr.splice(toIdx,0,m);sMeRows(nr);const h={...meHist,[selYear]:meHist[selYear]||me};YEARS.forEach(y=>{if(h[y]&&h[y].length>Math.max(fromIdx,toIdx)){const arr=[...h[y]];const[mv]=arr.splice(fromIdx,1);arr.splice(toIdx,0,mv);h[y]=arr}});sMH(h)};
  const reorderAe=(fromIdx,toIdx)=>{const nr=[...aeRows];const[m]=nr.splice(fromIdx,1);nr.splice(toIdx,0,m);sAeRows(nr);const h={...aeHist,[selYear]:aeHist[selYear]||ae};YEARS.forEach(y=>{if(h[y]&&h[y].length>Math.max(fromIdx,toIdx)){const arr=[...h[y]];const[mv]=arr.splice(fromIdx,1);arr.splice(toIdx,0,mv);h[y]=arr}});sAH(h)};
  const copyYear=(from,to)=>{sIH({...incHist,[to]:incHist[from]||income});sMH({...meHist,[to]:meHist[from]||me});sAH({...aeHist,[to]:aeHist[from]||ae});sSGH({...sgHist,[to]:sgHist[from]||sg})};

  const[onboarded,setOnboarded]=useLocalData("onboarded",false);

  const finishOnboarding=(data)=>{
    if(data.income>0){
      const nominaIdx=income.findIndex(r=>r.name.toLowerCase().includes("nómina")||r.name.toLowerCase().includes("nomina"));
      if(nominaIdx>=0){
        const newInc=income.map((r,i)=>i===nominaIdx?{...r,amounts:Array(12).fill(data.income)}:r);
        sI(newInc);
      }
    }
    if(data.rent>0){
      const rentIdx=me.findIndex(r=>r.name.toLowerCase().includes("alquiler")||r.name.toLowerCase().includes("hipoteca"));
      if(rentIdx>=0){
        const newMe=me.map((r,i)=>i===rentIdx?{...r,monthly:data.rent,real:Array(12).fill(null)}:r);
        sM(newMe);
      }
    }
    if(data.savings>0)sSG(Math.round(data.savings/100)*10);
    setOnboarded(true);sTab("m0");
  };

  const ctx={income,setIncome:sI,monthlyExp:me,setMonthlyExp:sM,annualExp:ae,setAnnualExp:sA,savingsGoal:sg,setSavingsGoal:sSG,selYear,setYear,YEARS,copyYear,incHist,meHist,aeHist,addIncRow,delIncRow,addMeRow,delMeRow,addAeRow,delAeRow,syncIncMeta,syncMeMeta,syncAeMeta,reorderInc,reorderMe,reorderAe};

  const[theme,toggleTheme]=useTheme();

  const TABS=[{id:"m0",l:"Dashboard",i:"🏠"},{id:"m1",l:"Ingresos",i:"💰"},{id:"m1b",l:"Gastos",i:"📉"},{id:"m2",l:"Patrimonio",i:"📊"},{id:"m3",l:"Hipoteca",i:"🏛"},{id:"m4",l:"Libertad Fin.",i:"🏆"},{id:"m6",l:"Jubilación",i:"🎲"},{id:"m7",l:"Planificador",i:"🎯"},{id:"m8",l:"Salud",i:"🩺"}];
  const render=()=>{switch(tab){case"m0":return<M0/>;case"m1":return<M1/>;case"m1b":return<M1b/>;case"m2":return<M2/>;case"m3":return<M3/>;case"m4":return<M4/>;case"m6":return<M6/>;case"m7":return<M7/>;case"m8":return<M8/>;default:return<M0/>}};

  // Alt+1..9 tab shortcuts
  useEffect(()=>{
    const onKey=(e)=>{
      if(!e.altKey||e.ctrlKey||e.metaKey||e.shiftKey)return;
      const t=e.target;if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.tagName==="SELECT"))return;
      const d=parseInt(e.key,10);if(d>=1&&d<=9&&TABS[d-1]){e.preventDefault();sTab(TABS[d-1].id)}
    };
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[]);

  return<><style>{CSS}</style><Toasts/><Ctx.Provider value={ctx}>
    {!onboarded&&<Onboarding onFinish={finishOnboarding}/>}
    <div style={{minHeight:"100vh",background:C.bg}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",borderBottom:`1px solid ${C.bd}`,background:C.w,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><a href="../" style={{fontSize:11,color:C.tm,textDecoration:"none",padding:"4px 8px",borderRadius:6,border:`1px solid ${C.bd}`,marginRight:6}} onMouseOver={e=>e.target.style.color=C.ac} onMouseOut={e=>e.target.style.color=C.tm}>← Hub</a><div style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${C.gn},#15803d)`}}><span style={{fontSize:15,fontWeight:800,color:C.w}}>V</span></div><span style={{fontSize:15,fontWeight:700}}>VDB</span><span style={{fontSize:15,color:C.td}}>Finance</span></div>
        <nav style={{display:"flex",gap:4,flexWrap:"wrap"}}>{TABS.map((t,i)=><Bt key={t.id} active={tab===t.id} onClick={()=>sTab(t.id)} style={{position:"relative"}} title={`${t.l} • Alt+${i+1}`}><span style={{marginRight:4}}>{t.i}</span><span className="tab-label">{t.l}</span></Bt>)}</nav>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={toggleTheme} title={theme==="dark"?"Tema claro":"Tema oscuro"} style={{background:"transparent",border:`1px solid ${C.bd}`,borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:13}}>{theme==="dark"?"☀️":"🌙"}</button>
          <SaveIndicator/>
        </div>
      </header>
      <main style={{maxWidth:1440,margin:"0 auto",padding:"18px 16px"}}>{render()}</main>
      <footer style={{textAlign:"center",padding:16,borderTop:`1px solid ${C.bd}`,color:C.tm,fontSize:10,marginTop:28,background:C.w}}>VDB Finance © {new Date().getFullYear()} — Datos guardados solo en tu navegador</footer>
    </div>
  </Ctx.Provider></>;
}
// Async cloud hydrate, then mount React
(async function(){
  try {
    const res = await fetch(_financeCloudEP, {cache:'no-store'});
    if (res.ok) {
      const txt = await res.text();
      if (txt && txt !== 'null') {
        const blob = JSON.parse(txt);
        for (const k in blob) if (blob.hasOwnProperty(k))
          localStorage.setItem(k, typeof blob[k]==='string' ? blob[k] : JSON.stringify(blob[k]));
      }
    }
  } catch(e) { console.warn('[cloud] load failed, using local', e); }
  _financeCloudReady = true;
  ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
})();
</script>
</body>
</html>
