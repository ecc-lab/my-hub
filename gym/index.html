<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GYM LOG · EC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:    #0d1520;
  --bg2:   #141f30;
  --bg3:   #1a2840;
  --bg4:   #0a1018;
  --gold:  #C8A96E;
  --gold-dim:   rgba(200,169,110,.15);
  --gold-faint: rgba(200,169,110,.08);
  --white: #F0EDE6;
  --dim:   rgba(240,237,230,.5);
  --faint: rgba(240,237,230,.08);
  --green: #4CAF7D;
  --green-dim: rgba(76,175,125,.12);
  --red:   #E05252;
  --red-dim:   rgba(224,82,82,.12);
  --border: rgba(200,169,110,.22);
  --bfaint: rgba(200,169,110,.10);
  --r: 12px;
  --sw: 220px;
}

body {
  background:var(--bg); color:var(--white);
  font-family:'DM Sans',sans-serif;
  min-height:100vh; overflow-x:hidden;
}

.display { font-family:'Bebas Neue',cursive; letter-spacing:.05em; }
.mono    { font-family:'DM Mono',monospace; }

/* ── LAYOUT ── */
.app-shell { display:flex; min-height:100vh; }

.sidebar {
  display:none; width:var(--sw);
  background:var(--bg2); border-right:1px solid var(--border);
  flex-direction:column; position:fixed;
  top:0; left:0; bottom:0; z-index:50; padding:28px 0;
}
.sidebar-brand {
  font-family:'Bebas Neue',cursive; font-size:26px;
  letter-spacing:.12em; color:var(--gold);
  padding:0 22px 24px; border-bottom:1px solid var(--bfaint);
  margin-bottom:14px; line-height:1;
}
.sidebar-brand span { display:block; font-size:10px; font-family:'DM Mono',monospace; letter-spacing:.2em; color:var(--dim); margin-top:3px; }
.sidebar-nav { flex:1; display:flex; flex-direction:column; gap:3px; padding:0 10px; }
.sb-btn {
  display:flex; align-items:center; gap:11px;
  padding:10px 13px; border-radius:9px;
  background:none; border:none; color:var(--dim);
  font-size:13px; font-weight:500; letter-spacing:.03em;
  font-family:'DM Sans',sans-serif; cursor:pointer;
  transition:background .15s,color .15s; text-align:left;
}
.sb-btn svg { width:17px; height:17px; flex-shrink:0; }
.sb-btn:hover { background:var(--faint); color:var(--white); }
.sb-btn.active { background:var(--gold-dim); color:var(--gold); }
.sidebar-footer {
  padding:16px 22px 0; border-top:1px solid var(--bfaint);
}
.hub-link {
  font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:.14em; text-transform:uppercase;
  color:rgba(240,237,230,.28); text-decoration:none; transition:color .2s;
}
.hub-link:hover { color:var(--gold); }
.hub-link-mobile {
  position:fixed; top:12px; right:14px; z-index:150;
  font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:.15em; text-transform:uppercase;
  color:rgba(240,237,230,.3); text-decoration:none;
  padding:6px 10px; transition:color .2s;
}
.hub-link-mobile:hover { color:var(--gold); }

.main-content {
  flex:1; max-width:480px;
  margin:0 auto; min-height:100vh;
}

.screen { display:none; padding:28px 20px 110px; }
.screen.active { display:block; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:var(--bg2); border-top:1px solid var(--border);
  display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom,8px);
}
.nav-btn {
  flex:1; padding:10px 0;
  background:none; border:none; color:var(--dim);
  font-size:8.5px; font-family:'DM Sans',sans-serif;
  font-weight:500; letter-spacing:.1em; text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; transition:color .2s;
}
.nav-btn.active { color:var(--gold); }
.nav-btn svg { width:19px; height:19px; }

/* DESKTOP */
@media(min-width:768px) {
  .sidebar { display:flex; }
  .main-content { margin-left:var(--sw); max-width:none; }
  .screen { max-width:640px; padding-bottom:60px; }
  .bottom-nav { display:none; }
  .hub-link-mobile { display:none; }
  .modal-overlay { align-items:center; }
  .modal { border-radius:16px; max-width:540px; max-height:82vh; }
  .modal-sm { max-width:360px; border-radius:16px; }
}
@media(min-width:520px) {
  body { border-left:1px solid rgba(200,169,110,.1); border-right:1px solid rgba(200,169,110,.1); }
}

/* ── TYPOGRAPHY ── */
.label-sm {
  font-size:10px; font-weight:500; letter-spacing:.15em;
  text-transform:uppercase; color:var(--gold); margin-bottom:4px;
}
.title-xl { font-size:44px; line-height:1; color:var(--white); }

/* ── CARDS ── */
.card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); padding:20px; margin-bottom:12px;
}
.card-label {
  font-size:10px; font-weight:500; letter-spacing:.12em;
  text-transform:uppercase; color:var(--dim); margin-bottom:14px;
}

.hero-card {
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1px solid var(--gold); border-radius:16px;
  padding:24px; margin-bottom:20px;
  position:relative; overflow:hidden;
}
.hero-card::before {
  content:''; position:absolute; top:-50px; right:-50px;
  width:140px; height:140px; background:var(--gold-dim); border-radius:50%;
}
.session-tag {
  display:inline-block; background:var(--gold); color:var(--bg);
  font-size:9px; font-weight:700; letter-spacing:.15em;
  text-transform:uppercase; padding:4px 10px; border-radius:20px; margin-bottom:10px;
}

/* ROUTINE CARD */
.routine-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); padding:18px 20px; margin-bottom:10px;
}
.routine-card-body { flex:1; }
.routine-card-name { font-size:17px; font-weight:600; margin-bottom:4px; }
.routine-card-meta { font-size:11px; color:var(--dim); }
.routine-card-actions { display:flex; gap:8px; align-items:center; margin-top:14px; }

/* EXERCISE ROW */
.ex-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid var(--faint);
}
.ex-row:last-child { border-bottom:none; }
.ex-name  { font-size:14px; font-weight:500; }
.ex-muscle{ font-size:11px; color:var(--dim); margin-top:2px; }
.ex-wt    { font-family:'DM Mono',monospace; font-size:15px; color:var(--gold); text-align:right; }
.ex-wt-unit { font-size:10px; color:var(--dim); display:block; }

/* ── BUTTONS ── */
.btn {
  width:100%; padding:15px; border:none; border-radius:var(--r);
  font-size:13px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:opacity .2s,transform .1s;
}
.btn:active { transform:scale(.98); opacity:.88; }
.btn-gold   { background:var(--gold); color:var(--bg); }
.btn-green  { background:var(--green); color:#fff; }
.btn-ghost  { background:transparent; color:var(--dim); border:1px solid var(--faint); margin-top:8px; }
.btn-danger { background:var(--red-dim); color:var(--red); border:1px solid rgba(224,82,82,.3); margin-top:8px; }
.btn-sm     { padding:10px 16px; font-size:11px; width:auto; display:inline-block; }

.icon-btn {
  width:34px; height:34px; background:var(--faint);
  border:1px solid var(--bfaint); border-radius:8px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .15s; flex-shrink:0;
  color:var(--dim);
}
.icon-btn:hover { background:var(--gold-dim); color:var(--gold); }
.icon-btn svg { width:15px; height:15px; }

/* ── SESSION ── */
.progress-bar { height:3px; background:var(--faint); border-radius:2px; margin-bottom:24px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:2px; transition:width .4s ease; }

.ex-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:16px; padding:20px; margin-bottom:12px;
  transition:border-color .3s;
}
.ex-card.is-active { border-color:rgba(200,169,110,.6); }
.ex-card.is-done   { opacity:.5; }

.ex-num      { font-family:'Bebas Neue',cursive; font-size:50px; color:var(--faint); line-height:1; margin-bottom:-6px; }
.ex-card-name{ font-size:20px; font-weight:500; margin-bottom:3px; }
.ex-card-meta{ font-size:11px; color:var(--dim); margin-bottom:16px; }

.weight-editor {
  display:flex; align-items:center; gap:10px;
  background:var(--bg); border-radius:10px;
  padding:10px 12px; margin-bottom:16px;
}
.wt-btn {
  width:36px; height:36px; background:var(--bg3);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; transition:background .15s; line-height:1;
}
.wt-btn:active { background:var(--gold-dim); }
.wt-display { flex:1; text-align:center; }
.wt-val  { font-family:'DM Mono',monospace; font-size:26px; color:var(--gold); display:block; }
.wt-lbl  { font-size:10px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; }

.sets-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; }
.sets-grid  { display:flex; gap:8px; }

.set-btn {
  flex:1; height:54px; border-radius:10px;
  border:2px solid var(--faint); background:transparent;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  transition:all .2s; font-family:'DM Mono',monospace;
}
.set-btn.is-next     { border-color:rgba(200,169,110,.5); background:rgba(200,169,110,.06); }
.set-btn.is-complete { background:var(--gold-dim); border-color:var(--gold); }
.set-num  { font-size:9px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; }
.set-reps { font-size:17px; color:var(--white); font-weight:500; }
.set-btn.is-complete .set-reps { color:var(--gold); }

/* ── REST ── */
.rest-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(10,17,27,.97); z-index:500;
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.rest-overlay.active { display:flex; }
.rest-lbl  { font-size:10px; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); }
.rest-time { font-family:'Bebas Neue',cursive; font-size:120px; line-height:1; color:var(--white); }
.rest-next { font-size:13px; color:var(--dim); text-align:center; max-width:240px; }
.skip-btn  {
  padding:12px 32px; background:transparent;
  border:1px solid var(--faint); border-radius:30px;
  color:var(--dim); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif;
}

/* ── HISTORY ── */
.h-session { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:10px; }
.h-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.h-date { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); }
.h-routine { font-size:11px; color:var(--dim); margin-top:2px; }
.h-row  { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--faint); font-size:13px; }
.h-row:last-child { border-bottom:none; }
.h-wt   { font-family:'DM Mono',monospace; color:var(--gold); }

/* ── STATS ── */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:14px; text-align:center; }
.stat-val  { font-family:'DM Mono',monospace; font-size:22px; color:var(--gold); margin-bottom:4px; }
.stat-lbl  { font-size:9px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase; }

/* ── ALERTS ── */
.alert-green { background:var(--green-dim); border:1px solid rgba(76,175,125,.35); border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
.alert-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--green); margin-bottom:7px; }
.alert-item  { font-size:13px; padding:3px 0; }

/* ── MODALS ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(10,17,27,.88); z-index:300;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.open { display:flex; }

.modal {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px 20px 0 0; width:100%;
  max-height:88vh; overflow-y:auto;
  padding:24px 20px 40px;
  -webkit-overflow-scrolling:touch;
}
.modal-sm {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px 20px 0 0; width:100%;
  padding:24px 20px 40px;
}

.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; padding-bottom:16px;
  border-bottom:1px solid var(--bfaint);
}
.modal-title { font-size:18px; font-weight:600; }
.modal-close {
  width:32px; height:32px; background:var(--faint);
  border:none; border-radius:8px; cursor:pointer;
  color:var(--dim); font-size:20px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; line-height:1;
}
.modal-close:hover { color:var(--white); }

/* FORM */
.form-group { margin-bottom:14px; }
.form-label {
  font-size:10px; font-weight:500; letter-spacing:.1em;
  text-transform:uppercase; color:var(--dim);
  margin-bottom:6px; display:block;
}
.form-input {
  width:100%; padding:11px 14px;
  background:var(--bg); border:1px solid var(--bfaint);
  border-radius:10px; color:var(--white);
  font-size:14px; font-family:'DM Sans',sans-serif;
  outline:none; transition:border-color .2s;
  -webkit-appearance:none;
}
.form-input:focus { border-color:var(--gold); }
.form-select {
  width:100%; padding:11px 14px;
  background:var(--bg); border:1px solid var(--bfaint);
  border-radius:10px; color:var(--white);
  font-size:14px; font-family:'DM Sans',sans-serif;
  outline:none; -webkit-appearance:none; appearance:none;
}
.form-row { display:flex; gap:10px; }
.form-row .form-group { flex:1; }

/* STEPPER */
.stepper {
  display:flex; align-items:center;
  background:var(--bg); border:1px solid var(--bfaint);
  border-radius:8px; overflow:hidden;
}
.stepper-btn {
  width:32px; height:34px; background:none; border:none;
  color:var(--white); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s; line-height:1;
}
.stepper-btn:hover { background:var(--faint); }
.stepper-val {
  flex:1; text-align:center;
  font-family:'DM Mono',monospace; font-size:14px; color:var(--gold);
  min-width:28px;
}

/* ROUTINE EXERCISE ITEM (in editor) */
.re-item {
  background:var(--bg); border:1px solid var(--bfaint);
  border-radius:10px; padding:12px 14px; margin-bottom:8px;
}
.re-item-header {
  display:flex; align-items:flex-start;
  justify-content:space-between; margin-bottom:10px;
}
.re-item-name   { font-size:14px; font-weight:500; }
.re-item-muscle { font-size:11px; color:var(--dim); margin-top:2px; }
.re-params      { display:flex; gap:16px; flex-wrap:wrap; }
.re-param       { display:flex; flex-direction:column; gap:4px; }
.re-param-label { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }

/* EXERCISE PICKER */
.picker-search {
  width:100%; padding:9px 12px;
  background:var(--bg); border:1px solid var(--bfaint);
  border-radius:8px; color:var(--white); font-size:13px;
  font-family:'DM Sans',sans-serif; outline:none;
  margin-bottom:10px;
}
.picker-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 12px; border-radius:8px;
  cursor:pointer; transition:background .15s;
}
.picker-item:hover { background:var(--faint); }
.picker-item.in-routine { opacity:.35; pointer-events:none; }

/* LIBRARY */
.lib-item {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px; margin-bottom:8px;
  display:flex; align-items:center; justify-content:space-between;
}

/* PROGRESS CHARTS */
.prog-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:20px; margin-bottom:12px; }
.prog-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.prog-name { font-size:15px; font-weight:500; margin-bottom:3px; }
.prog-muscle { font-size:11px; color:var(--dim); }
.prog-wt { font-family:'DM Mono',monospace; font-size:26px; color:var(--gold); text-align:right; }
.prog-gain { font-size:11px; text-align:right; margin-top:2px; }

/* EMPTY */
.empty { text-align:center; padding:52px 20px; color:var(--dim); }
.empty-icon { font-size:44px; margin-bottom:12px; }
.empty-sub  { font-size:12px; margin-top:6px; }

/* UPGRADE */
.upgrade {
  background:linear-gradient(135deg,#1a2840,#1f3050);
  border:1px dashed rgba(200,169,110,.4);
  border-radius:var(--r); padding:16px; margin-top:14px;
}
.upgrade-title { font-size:11px; font-weight:600; color:var(--gold); margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
.upgrade-text  { font-size:12px; color:var(--dim); line-height:1.6; }

/* ACTIVE SESSION BANNER */
.sess-banner {
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid rgba(200,169,110,.5);
  border-radius:var(--r); padding:16px 18px; margin-bottom:16px;
  display:flex; align-items:center; justify-content:space-between;
}

.divider {
  font-size:10px; font-weight:500; letter-spacing:.15em;
  text-transform:uppercase; color:var(--dim);
  display:flex; align-items:center; gap:10px; margin:20px 0 14px;
}
.divider::before,.divider::after {
  content:''; flex:1; height:1px; background:var(--faint);
}
</style>
</head>
<body>

<a href="../" class="hub-link-mobile">&larr; Hub</a>

<div class="app-shell">
  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-brand">GYM LOG<span>EC · Fuerza</span></div>
    <nav class="sidebar-nav">
      <button class="sb-btn active" id="sb-home" onclick="showScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Inicio
      </button>
      <button class="sb-btn" id="sb-train" onclick="showScreen('train')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        Entrenar
      </button>
      <button class="sb-btn" id="sb-routines" onclick="showScreen('routines')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Rutinas
      </button>
      <button class="sb-btn" id="sb-history" onclick="showScreen('history')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Historial
      </button>
      <button class="sb-btn" id="sb-progress" onclick="showScreen('progress')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        Progreso
      </button>
    </nav>
    <div class="sidebar-footer">
      <a href="../" class="hub-link">&larr; Hub</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div style="margin-bottom:22px;">
        <div class="label-sm">Programa de Fuerza</div>
        <div class="display title-xl">GYM LOG</div>
      </div>
      <div id="home-content"></div>
    </div>

    <!-- TRAIN -->
    <div class="screen" id="screen-train">
      <div id="train-content"></div>
    </div>

    <!-- ROUTINES -->
    <div class="screen" id="screen-routines">

<script>
// ───────────────────────────────────────────────
// CLOUD SYNC (async, non-blocking)
// ───────────────────────────────────────────────
var _gymCloudEP='/api/data/gymlog%3Aec_v3';
var _gymCloudReady=false;
(function(){
  var _o=localStorage.setItem.bind(localStorage),_t=null;
  localStorage.setItem=function(k,v){
    _o(k,v);
    if(k==='gymlog_ec_v3'&&_gymCloudReady){clearTimeout(_t);_t=setTimeout(function(){
      var s={}; try{s[k]=JSON.parse(localStorage.getItem(k))}catch(e){}
      fetch(_gymCloudEP,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(s)})
        .then(function(r){if(!r.ok)console.warn('[cloud] sync failed',r.status)})
        .catch(function(e){console.warn('[cloud] sync error',e)});
    },800);}
  };
})();

// ───────────────────────────────────────────────
// DEFAULTS
// ───────────────────────────────────────────────
var DEF_EXERCISES = [
  {id:'rdl',    name:'Romanian Deadlift', muscle:'Isquios · Glúteos',    equipment:'2 mancuernas', defaultSets:3, defaultReps:10, defaultWeight:5,   unit:'kg c/u'},
  {id:'goblet', name:'Goblet Squat',      muscle:'Cuádriceps · Glúteos', equipment:'1 mancuerna',  defaultSets:3, defaultReps:10, defaultWeight:5,   unit:'kg'},
  {id:'row',    name:'Dumbbell Row',      muscle:'Espalda media',        equipment:'1 mancuerna',  defaultSets:3, defaultReps:10, defaultWeight:5,   unit:'kg'},
  {id:'ohp',    name:'Overhead Press',    muscle:'Hombros',              equipment:'2 mancuernas', defaultSets:3, defaultReps:10, defaultWeight:5,   unit:'kg c/u'},
  {id:'lateral',name:'Lateral Raise',     muscle:'Hombros laterales',    equipment:'2 mancuernas', defaultSets:3, defaultReps:10, defaultWeight:2.5, unit:'kg c/u'},
  {id:'curl',   name:'Curl de Bíceps',    muscle:'Bíceps',               equipment:'2 mancuernas', defaultSets:3, defaultReps:10, defaultWeight:5,   unit:'kg c/u'},
  {id:'abwheel',name:'Ab Wheel',          muscle:'Core',                 equipment:'Rueda',        defaultSets:3, defaultReps:5,  defaultWeight:0,   unit:'PC'}
];
var DEF_ROUTINES = [
  {id:'r1', name:'Fuerza Full Body', exercises:[
    {exId:'rdl',    sets:3, reps:10, weight:5},
    {exId:'goblet', sets:3, reps:10, weight:5},
    {exId:'row',    sets:3, reps:10, weight:5},
    {exId:'ohp',    sets:3, reps:10, weight:5},
    {exId:'lateral',sets:3, reps:10, weight:2.5},
    {exId:'curl',   sets:3, reps:10, weight:5},
    {exId:'abwheel',sets:3, reps:5,  weight:0}
  ]}
];
var REST_SEC = 60;

// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
var data = null;
var sess = null;
var restInterval = null;
var restLeft = 0;
var _re = null;        // routine editor working copy
var _showPicker = false;
var _pickerSearch = '';
var _ee = null;        // exercise editor working copy  {exercise, isNew, fromRoutine}
var _confirmCb = null;

// ───────────────────────────────────────────────
// STORAGE
// ───────────────────────────────────────────────
function loadData() {
  try {
    var raw = localStorage.getItem('gymlog_ec_v3');
    if (raw) { data = JSON.parse(raw); }
    else { data = {exercises: DEF_EXERCISES.slice(), routines: DEF_ROUTINES.map(function(r){return JSON.parse(JSON.stringify(r))}), sessions:[], weights:{}}; }
    // ensure arrays exist
    if (!data.exercises) data.exercises = DEF_EXERCISES.slice();
    if (!data.routines)  data.routines  = [];
    if (!data.sessions)  data.sessions  = [];
    if (!data.weights)   data.weights   = {};
  } catch(e) {
    data = {exercises: DEF_EXERCISES.slice(), routines: DEF_ROUTINES.map(function(r){return JSON.parse(JSON.stringify(r))}), sessions:[], weights:{}};
  }
  migrateV2();
}

function migrateV2() {
  try {
    var raw = localStorage.getItem('gymlog_ec_v2');
    if (!raw) return;
    var old = JSON.parse(raw);
    // Validate structure before migrating
    if (old.sessions && Array.isArray(old.sessions) && !data.sessions.length) {
      var valid = old.sessions.filter(function(s) {
        return s && s.date && Array.isArray(s.exercises);
      });
      if (valid.length) data.sessions = valid;
    }
    if (old.weights && typeof old.weights === 'object') {
      for (var k in old.weights) if (old.weights.hasOwnProperty(k)) {
        var w = Number(old.weights[k]);
        if (!isNaN(w) && data.weights[k] === undefined) data.weights[k] = w;
      }
    }
    save();
    console.log('[gymlog] Migrated ' + (data.sessions.length) + ' sessions from v2');
  } catch(e) { console.warn('[gymlog] v2 migration failed', e); }
}

function save() {
  try {
    localStorage.setItem('gymlog_ec_v3', JSON.stringify(data));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      alert('Almacenamiento lleno. Borra datos antiguos o limpia la caché del navegador.');
    } else {
      console.warn('[gymlog] save error', e);
    }
  }
}

function getEx(id)      { return data.exercises.find(function(e){return e.id===id}); }
function getRoutine(id) { return data.routines.find(function(r){return r.id===id}); }
function getWt(exId) {
  if (data.weights[exId] !== undefined) return data.weights[exId];
  var ex = getEx(exId); return ex ? ex.defaultWeight : 0;
}

// ───────────────────────────────────────────────
// DATE UTILS
// ───────────────────────────────────────────────
function todayISO() {
  var d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }

function fmtShort(str) {
  var d = new Date(str+'T00:00:00');
  var days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mths=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return days[d.getDay()]+' '+d.getDate()+' '+mths[d.getMonth()]+' '+d.getFullYear();
}
function fmtFull(str) {
  var d = new Date(str+'T00:00:00');
  var days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var mths=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return days[d.getDay()]+' '+d.getDate()+' de '+mths[d.getMonth()];
}
function daysSince(str) {
  if (!str) return null;
  var then = new Date(str+'T00:00:00');
  var now  = new Date(); now.setHours(0,0,0,0);
  return Math.round((now-then)/(1000*60*60*24));
}

// ───────────────────────────────────────────────
// PROGRESSION
// ───────────────────────────────────────────────
function canProgress(exId) {
  var last2 = data.sessions.slice(-2);
  if (last2.length < 2) return false;
  return last2.every(function(s){
    var ex = s.exercises.find(function(e){return e.exId===exId||e.id===exId});
    return ex && ex.completedSets && ex.completedSets.filter(Boolean).length >= 3 && ex.completedSets.every(Boolean);
  });
}

// ───────────────────────────────────────────────
// NAVIGATION
// ───────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.sb-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('screen-'+name).classList.add('active');
  var nb = document.getElementById('nav-'+name);
  var sb = document.getElementById('sb-'+name);
  if (nb) nb.classList.add('active');
  if (sb) sb.classList.add('active');
  var renders = {home:renderHome, train:renderTrain, routines:renderRoutines, history:renderHistory, progress:renderProgress};
  if (renders[name]) renders[name]();
}

// ───────────────────────────────────────────────
// RENDER: HOME
// ───────────────────────────────────────────────
function renderHome() {
  var total = data.sessions.length;
  var lastSess = data.sessions.length ? data.sessions[data.sessions.length-1] : null;
  var ds = lastSess ? daysSince(lastSess.date) : null;
  var streak = computeStreak();
  var doneTdy = data.sessions.find(function(s){return s.date===todayISO()});
  var ups = data.exercises.filter(function(ex){ return ex.unit!=='PC' && canProgress(ex.id); });

  // Session banner
  var banner = '';
  if (sess) {
    var done = sess.exercises.reduce(function(s,e){return s+e.completedSets.filter(Boolean).length},0);
    var ttl  = sess.exercises.reduce(function(s,e){return s+e.completedSets.length},0);
    banner = '<div class="sess-banner" style="cursor:pointer;" onclick="showScreen(\'train\')">'
      +'<div><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;">Sesión en curso</div>'
      +'<div style="font-size:15px;font-weight:600;">'+sess.routineName+'</div>'
      +'<div style="font-size:12px;color:var(--dim);margin-top:2px;">'+done+' / '+ttl+' series completadas</div></div>'
      +'<div style="color:var(--gold);font-size:22px;">›</div></div>';
  }

  // Stats
  var statsHtml = '<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-lbl">Sesiones</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+(ds===null?'—':(ds===0?'Hoy':ds===1?'Ayer':ds+'d'))+'</div><div class="stat-lbl">Último</div></div>'
    +'<div class="stat-card"><div class="stat-val">'+streak+'</div><div class="stat-lbl">Racha</div></div>'
    +'</div>';

  // Alerts
  var alertHtml = ups.length ? '<div class="alert-green"><div class="alert-label">↑ Sube peso esta sesión</div>'
    +ups.map(function(ex){
      return '<div class="alert-item">'+ex.name+' → <strong style="color:var(--green);font-family:DM Mono,monospace;">'+(getWt(ex.id)+1.25).toFixed(2)+' kg</strong></div>';
    }).join('')+'</div>' : '';

  // Exercise list (last routine used or first routine)
  var lastRoutineId = lastSess ? lastSess.routineId : (data.routines[0] ? data.routines[0].id : null);
  var showRoutine = lastRoutineId ? getRoutine(lastRoutineId) : (data.routines[0]||null);
  var exListHtml = '';
  if (showRoutine) {
    exListHtml = '<div class="card"><div class="card-label">'
      +showRoutine.name+' · '+showRoutine.exercises.length+' ejercicios'
      +'</div>'
      +showRoutine.exercises.map(function(re){
        var ex = getEx(re.exId); if(!ex) return '';
        var w = getWt(ex.id), up = canProgress(ex.id);
        return '<div class="ex-row"><div>'
          +'<div class="ex-name">'+ex.name+(up?' <span style="color:var(--green);font-size:11px;">↑</span>':'')+'</div>'
          +'<div class="ex-muscle">'+ex.muscle+'</div>'
          +'</div><div class="ex-wt">'+(ex.unit==='PC'?'<span style="color:var(--dim);font-size:12px;">Peso propio</span>':w+'<span class="ex-wt-unit">'+ex.unit+'</span>')+'</div></div>';
      }).join('')
      +'</div>';
  }

  // Start button
  var btnHtml = '';
  if (!sess) {
    if (doneTdy) {
      btnHtml = '<button class="btn btn-ghost" style="opacity:.5;margin-bottom:14px;">✓ Sesión completada hoy</button>';
    } else {
      var firstRoutineId = data.routines[0] ? data.routines[0].id : null;
      var tid = lastRoutineId || firstRoutineId;
      if (tid) btnHtml = '<button class="btn btn-gold" style="margin-bottom:14px;" onclick="startSession(\''+tid+'\')">Iniciar Sesión</button>';
      else     btnHtml = '<button class="btn btn-gold" style="margin-bottom:14px;" onclick="showScreen(\'routines\')">Crear primera rutina</button>';
    }
  }

  document.getElementById('home-content').innerHTML = banner + statsHtml + alertHtml + btnHtml + exListHtml
    +'<div class="upgrade"><div class="upgrade-title">📋 Próxima compra recomendada</div>'
    +'<div class="upgrade-text">Banco regulable plegable · Trex Sport en Allegro · ~200 zł<br>Desbloquea: remo con apoyo correcto, press inclinado, curl concentrado</div></div>';
}

function computeStreak() {
  if (!data.sessions.length) return 0;
  var dates = data.sessions.map(function(s){return s.date}).sort();
  var unique = dates.filter(function(d,i){return dates.indexOf(d)===i});
  var streak = 0, today = new Date(); today.setHours(0,0,0,0);
  for (var i = unique.length-1; i >= 0; i--) {
    var d = new Date(unique[i]+'T00:00:00');
    var diff = Math.round((today-d)/(86400000));
    if (diff === streak) streak++;
    else break;
  }
  return streak;
}

// ───────────────────────────────────────────────
// RENDER: TRAIN
// ───────────────────────────────────────────────
function renderTrain() {
  var el = document.getElementById('train-content');
  if (!sess) {
    // Routine picker
    if (!data.routines.length) {
      el.innerHTML = '<div style="margin-bottom:22px;"><div class="label-sm">Sesión</div><div class="display title-xl">Entrenar</div></div>'
        +'<div class="empty"><div class="empty-icon">🏋️</div><div>Sin rutinas</div><div class="empty-sub">Crea una rutina primero en la pestaña Rutinas</div></div>'
        +'<button class="btn btn-gold" onclick="showScreen(\'routines\')">Ir a Rutinas</button>';
      return;
    }
    el.innerHTML = '<div style="margin-bottom:22px;"><div class="label-sm">Selecciona</div><div class="display title-xl">Entrenar</div></div>'
      +data.routines.map(function(r){
        var exCount = r.exercises.length;
        var mins = Math.round(exCount * (r.exercises.reduce(function(s,e){return s+e.sets},0) / exCount) * 1.5 + 5);
        return '<div class="routine-card">'
          +'<div class="routine-card-name">'+r.name+'</div>'
          +'<div class="routine-card-meta">'+exCount+' ejercicios · ~'+mins+' min</div>'
          +'<div class="routine-card-actions">'
          +'<button class="btn btn-gold btn-sm" onclick="startSession(\''+r.id+'\')">Empezar</button>'
          +'</div></div>';
      }).join('');
    return;
  }

  // Active session
  var total = sess.exercises.reduce(function(s,e){return s+e.completedSets.length},0);
  var done  = sess.exercises.reduce(function(s,e){return s+e.completedSets.filter(Boolean).length},0);
  var allComplete = sess.exercises.every(function(e){return e.completedSets.every(Boolean)});

  var progressHtml = '<div class="progress-bar"><div class="progress-fill" style="width:'+(done/total*100)+'%"></div></div>';

  var headerHtml = '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">'
    +'<div><div class="label-sm">'+sess.routineName+'</div><div class="display" style="font-size:36px;line-height:1;">'+fmtFull(sess.date)+'</div></div>'
    +'<div class="mono" style="font-size:12px;color:var(--dim);text-align:right;padding-top:4px;">'+done+'/'+total+'<br>series</div>'
    +'</div>';

  var exercisesHtml = sess.exercises.map(function(ex,ei){
    var exDone = ex.completedSets.every(Boolean);
    var isActive = ei === sess.exIdx;
    var nextSet = ex.completedSets.indexOf(false);
    var showWeightEditor = ex.unit !== 'PC';
    return '<div class="ex-card'+(exDone?' is-done':'')+(isActive&&!exDone?' is-active':'')+'"><div class="ex-num display">'+String(ei+1).padStart(2,'0')+'</div>'
      +'<div class="ex-card-name">'+ex.name+'</div>'
      +'<div class="ex-card-meta">'+ex.muscle+' · '+ex.equipment+'</div>'
      +(showWeightEditor
        ? '<div class="weight-editor"><button class="wt-btn" onclick="adjSessWt('+ei+',-1.25)">−</button><div class="wt-display"><span class="wt-val">'+ex.weight+'</span><span class="wt-lbl">'+ex.unit+'</span></div><button class="wt-btn" onclick="adjSessWt('+ei+',1.25)">+</button></div>'
        : '<div style="background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--dim);">Peso propio · Sin carga adicional</div>'
      )
      +'<div class="sets-label">'+ex.sets+' Series × '+ex.reps+' Reps</div>'
      +'<div class="sets-grid">'
      +ex.completedSets.map(function(d,si){
        return '<button class="set-btn'+(d?' is-complete':si===nextSet&&isActive?' is-next':'')+'" onclick="completeSet('+ei+','+si+')">'
          +'<span class="set-num">S'+(si+1)+'</span>'
          +'<span class="set-reps">'+(d?'✓':ex.reps)+'</span>'
          +'</button>';
      }).join('')
      +'</div>'
      +(exDone?'<div style="color:var(--green);font-size:11px;margin-top:10px;text-align:center;letter-spacing:.08em;">✓ COMPLETADO</div>':'')
      +'</div>';
  }).join('');

  var footerHtml = '<div style="margin-top:4px;">'
    +(allComplete?'<button class="btn btn-green" onclick="finishSession()">✓ Guardar Sesión</button>':'')
    +'<button class="btn btn-ghost" onclick="abandonSession()">Abandonar sesión</button>'
    +'</div>';

  el.innerHTML = progressHtml + headerHtml + exercisesHtml + footerHtml;
}

// ───────────────────────────────────────────────
// SESSION LOGIC
// ───────────────────────────────────────────────
function startSession(routineId) {
  var routine = getRoutine(routineId);
  if (!routine) return;
  sess = {
    date: todayISO(),
    routineId: routineId,
    routineName: routine.name,
    exIdx: 0,
    exercises: routine.exercises.map(function(re) {
      var ex = getEx(re.exId);
      if (!ex) return null;
      return {
        exId:    ex.id,
        id:      ex.id,
        name:    ex.name,
        muscle:  ex.muscle,
        equipment: ex.equipment,
        unit:    ex.unit,
        weight:  getWt(ex.id) !== undefined ? getWt(ex.id) : re.weight,
        sets:    re.sets,
        reps:    re.reps,
        completedSets: Array(re.sets).fill(false)
      };
    }).filter(Boolean)
  };
  showScreen('train');
}

function adjSessWt(ei, delta) {
  if (!sess) return;
  sess.exercises[ei].weight = Math.max(0, Math.round((sess.exercises[ei].weight + delta) * 4) / 4);
  renderTrain();
}

function completeSet(ei, si) {
  if (!sess) return;
  var ex = sess.exercises[ei];
  // toggle
  ex.completedSets[si] = !ex.completedSets[si];
  // advance active exercise
  var exDone = ex.completedSets.every(Boolean);
  if (exDone && ei < sess.exercises.length-1) sess.exIdx = ei+1;
  else if (!exDone) sess.exIdx = ei;
  var allDone = sess.exercises.every(function(e){ return e.completedSets.every(Boolean); });
  renderTrain();
  if (ex.completedSets[si] && !allDone) startRest(ei, si);
}

function finishSession() {
  if (!sess) return;
  sess.exercises.forEach(function(ex) { data.weights[ex.exId] = ex.weight; });
  data.sessions = data.sessions.filter(function(s){ return s.date !== sess.date; });
  data.sessions.push({
    date: sess.date,
    routineId: sess.routineId,
    routineName: sess.routineName,
    exercises: sess.exercises.map(function(ex){
      return {exId:ex.exId, id:ex.exId, name:ex.name, weight:ex.weight, sets:ex.sets, reps:ex.reps, unit:ex.unit, completedSets:ex.completedSets.slice()};
    })
  });
  data.sessions.sort(function(a,b){ return a.date.localeCompare(b.date); });
  save();
  sess = null;
  showScreen('home');
}

function abandonSession() {
  showConfirm('¿Abandonar la sesión? El progreso no se guardará.', function() {
    sess = null; renderTrain(); showScreen('home');
  });
}

// ───────────────────────────────────────────────
// REST TIMER
// ───────────────────────────────────────────────
function startRest(ei, si) {
  clearInterval(restInterval); restLeft = REST_SEC;
  var ex = sess.exercises[ei];
  var nextSi = si + 1;
  var label = '';
  if (nextSi < ex.sets) label = 'Siguiente: '+ex.name+' — Serie '+(nextSi+1);
  else if (ei+1 < sess.exercises.length) label = 'Siguiente ejercicio: '+sess.exercises[ei+1].name;
  else label = '¡Último set completado!';
  document.getElementById('rest-time').textContent = restLeft;
  document.getElementById('rest-next').textContent = label;
  document.getElementById('rest-overlay').classList.add('active');
  restInterval = setInterval(function(){
    restLeft--;
    document.getElementById('rest-time').textContent = restLeft;
    if (restLeft <= 0) skipRest();
  }, 1000);
}

function skipRest() {
  clearInterval(restInterval);
  document.getElementById('rest-overlay').classList.remove('active');
}

function openRoutineEditor(routineId) {

          +'</div></div>'

          +'<span class="stepper-val">'+re.reps+'</span>'
          +'<button class="stepper-btn" onclick="adjRe('+idx+',\'reps\',1)">+</button>'
          +'</div></div>'
          +(!isBodyweight
            ?'<div class="re-param"><div class="re-param-label">Peso ('+ex.unit+')</div><div class="stepper">'
            +'<button class="stepper-btn" onclick="adjRe('+idx+',\'weight\',-1.25)">−</button>'
            +'<span class="stepper-val mono" style="min-width:42px;">'+re.weight+'</span>'
            +'<button class="stepper-btn" onclick="adjRe('+idx+',\'weight\',1.25)">+</button>'
            +'</div></div>'
            :'')
          +'</div></div>';
      }).join('')
    : '<div style="text-align:center;padding:20px;color:var(--dim);font-size:13px;">Sin ejercicios. Añade uno abajo.</div>';

  var pickerHtml = '';

    var filtered = data.exercises.filter(function(ex){
      var search = _pickerSearch.toLowerCase();
      return (!search || ex.name.toLowerCase().includes(search) || ex.muscle.toLowerCase().includes(search));

    +'<div style="margin-bottom:12px;"><div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;">Ejercicios</div>'

function togglePicker() { _showPicker = !_showPicker; renderRoutineEditor(); }
function setPickerSearch(v) { _pickerSearch = v; renderRoutineEditor(); }

function addExToRoutine(exId) {
  var ex = getEx(exId);
  if (!ex) return;
  _re.exercises.push({exId:exId, sets:ex.defaultSets, reps:ex.defaultReps, weight:ex.defaultWeight});
  _showPicker = false;
  renderRoutineEditor();
}

function removeExFromRoutine(idx) {
  _re.exercises.splice(idx,1);
  renderRoutineEditor();
}

function moveEx(idx, dir) {
  var ni = idx + dir;
  if (ni < 0 || ni >= _re.exercises.length) return;
  var tmp = _re.exercises[idx];
  _re.exercises[idx] = _re.exercises[ni];
  _re.exercises[ni] = tmp;
  renderRoutineEditor();
}

function adjRe(idx, param, delta) {
  var re = _re.exercises[idx];
  if (param === 'sets')   re.sets   = Math.max(1, re.sets + delta);
  if (param === 'reps')   re.reps   = Math.max(1, re.reps + delta);
  if (param === 'weight') re.weight = Math.max(0, Math.round((re.weight + delta) * 4) / 4);
  renderRoutineEditor();
}

function saveRoutine() {
  if (!_re.name.trim()) { alert('Ponle un nombre a la rutina'); return; }
  var idx = data.routines.findIndex(function(r){ return r.id === _re.id; });
  var toSave = {id:_re.id, name:_re.name.trim(), exercises:_re.exercises.slice()};
  if (idx >= 0) data.routines[idx] = toSave;
  else data.routines.push(toSave);
  save();
  closeRoutineEditor();
  renderRoutines();
}

function deleteRoutineFromEditor() {
  showConfirm('¿Eliminar la rutina "'+_re.name+'"?', function(){
    data.routines = data.routines.filter(function(r){ return r.id !== _re.id; });
    save(); closeRoutineEditor(); renderRoutines();
  });
}
function deleteRoutineConfirm(routineId) {
  var r = getRoutine(routineId);
  showConfirm('¿Eliminar la rutina "'+(r?r.name:'')+ '"?', function(){
    data.routines = data.routines.filter(function(r){ return r.id !== routineId; });
    save(); renderRoutines();
  });
}

function closeRoutineEditor() {
  document.getElementById('modal-routine').classList.remove('open');
  _re = null; _showPicker = false;
}

function saveExercise() {
  var ex = _ee.exercise;
  if (!ex.name.trim()) { alert('Añade un nombre al ejercicio'); return; }
  ex.name = ex.name.trim(); ex.muscle = ex.muscle.trim(); ex.equipment = ex.equipment.trim();
  var idx = data.exercises.findIndex(function(e){ return e.id === ex.id; });
  if (idx >= 0) data.exercises[idx] = ex;
  else data.exercises.push(ex);
  save();
  var fromRoutine = _ee.fromRoutine;
  var newExId = ex.id;
  closeExerciseEditor();
  if (fromRoutine && _re) {
    addExToRoutine(newExId);
  }
  renderRoutines();
}

function deleteExercise() {
  var ex = _ee.exercise;
  showConfirm('¿Eliminar "'+ex.name+'"? Se quitará de todas las rutinas.', function(){
    data.exercises = data.exercises.filter(function(e){ return e.id !== ex.id; });
    data.routines.forEach(function(r){
      r.exercises = r.exercises.filter(function(re){ return re.exId !== ex.id; });
    });
    save(); closeExerciseEditor(); renderRoutines();
  });

function renderHistory() {
  var el = document.getElementById('history-content');
  if (!data.sessions.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div>Sin sesiones aún</div><div class="empty-sub">Completa tu primera sesión</div></div>';
    return;
  }
  el.innerHTML = data.sessions.slice().reverse().map(function(s){
    var done = s.exercises.reduce(function(t,e){ return t+(e.completedSets||e.sets||[]).filter(Boolean).length; },0);
    var ttl  = s.exercises.reduce(function(t,e){ return t+(e.completedSets||e.sets||[]).length; },0);
    return '<div class="h-session">'
      +'<div class="h-header"><div><div class="h-date">'+fmtShort(s.date)+'</div>'
      +(s.routineName?'<div class="h-routine">'+s.routineName+'</div>':'')
      +'</div><div class="mono" style="font-size:12px;color:var(--gold);">'+done+'/'+ttl+'</div></div>'
      +s.exercises.map(function(ex){
        var cSets = ex.completedSets || ex.sets || [];
        var doneCount = typeof cSets[0] === 'boolean' ? cSets.filter(Boolean).length : cSets.length;
        var totalCount = cSets.length;
        return '<div class="h-row"><span>'+ex.name+'</span>'
          +'<span class="h-wt">'+(ex.unit==='PC'?'PC':ex.weight+'kg')+' · '+doneCount+'/'+totalCount+'</span></div>';
      }).join('')
      +'</div>';
  }).join('');
}

// ───────────────────────────────────────────────
// RENDER: PROGRESS
// ───────────────────────────────────────────────
function renderProgress() {
  var el = document.getElementById('progress-content');
  if (!data.sessions.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📈</div><div>Los datos aparecen tras la primera sesión</div></div>';
    return;
  }

  // Build history per exercise
  var exHistory = {};
  data.sessions.forEach(function(s){
    s.exercises.forEach(function(ex){
      var id = ex.exId || ex.id;
      if (!exHistory[id]) exHistory[id] = [];
      exHistory[id].push({date:s.date, weight:ex.weight});
    });
  });

  el.innerHTML = data.exercises.filter(function(ex){ return ex.unit !== 'PC'; }).map(function(ex){
    var hist = exHistory[ex.id] || [];
    if (!hist.length) return '';
    var cur = getWt(ex.id);
    var first = hist[0].weight;
    var gain = cur - first;
    var up = canProgress(ex.id);
    var chartHtml = hist.length >= 2 ? svgChart(hist) : '<div style="font-size:11px;color:var(--dim);text-align:center;padding:12px 0;">Entrena 2+ veces para ver la gráfica</div>';

    return '<div class="prog-card">'
      +'<div class="prog-header">'
      +'<div><div class="prog-name">'+ex.name+'</div><div class="prog-muscle">'+ex.muscle+'</div></div>'
      +'<div><div class="prog-wt">'+cur+'<span style="font-size:11px;color:var(--dim);"> '+ex.unit+'</span></div>'
      +'<div class="prog-gain" style="color:'+(gain>0?'var(--green)':'var(--dim)')+'">'
      +(gain>0?'+'+gain.toFixed(2)+' kg':'Peso inicial')+'</div></div>'
      +'</div>'
      +(up?'<div style="background:var(--green-dim);border:1px solid rgba(76,175,125,.35);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:12px;">↑ Listo para subir a <strong class="mono">'+(cur+1.25).toFixed(2)+' kg</strong></div>':'')
      +chartHtml
      +'<div style="display:flex;justify-content:space-between;margin-top:8px;">'
      +'<span style="font-size:10px;color:var(--dim);">'+fmtShort(hist[0].date)+'</span>'
      +'<span style="font-size:10px;color:var(--dim);">'+hist.length+' sesiones</span>'
      +'<span style="font-size:10px;color:var(--dim);">'+fmtShort(hist[hist.length-1].date)+'</span>'
      +'</div></div>';
  }).join('');
}

function svgChart(history) {
  var last = history.slice(-12);
  var weights = last.map(function(h){ return h.weight; });
  var min = Math.min.apply(null,weights);
  var max = Math.max.apply(null,weights);
  var range = max - min || 1;
  var W=280, H=70, pad=8;
  var pts = weights.map(function(w,i){
    var x = pad + (i/(weights.length-1)) * (W-2*pad);
    var y = H - pad - ((w-min)/range)*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  var lastPt = pts[pts.length-1].split(',');
  var areaBase = H - pad;
  var areaPts = [pad+','+areaBase].concat(pts).concat([(W-pad)+','+areaBase]);
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block;">'
    +'<defs><linearGradient id="cg'+encodeURIComponent(history[0].date)+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="#C8A96E" stop-opacity="0.25"/>'
    +'<stop offset="100%" stop-color="#C8A96E" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<polygon points="'+areaPts.join(' ')+'" fill="url(#cg'+encodeURIComponent(history[0].date)+')" />'
    +'<polyline points="'+pts.join(' ')+'" fill="none" stroke="#C8A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+lastPt[0]+'" cy="'+lastPt[1]+'" r="4" fill="#C8A96E"/>'
    +'</svg>';
}

// ───────────────────────────────────────────────
// UTILS
// ───────────────────────────────────────────────
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modals on overlay click
document.getElementById('modal-routine').addEventListener('click', function(e){ if(e.target===this) closeRoutineEditor(); });
document.getElementById('modal-exercise').addEventListener('click', function(e){ if(e.target===this) closeExerciseEditor(); });
document.getElementById('modal-confirm').addEventListener('click', function(e){ if(e.target===this) closeConfirm(); });

// ───────────────────────────────────────────────
// INIT (async cloud-first, then local fallback)
// ───────────────────────────────────────────────
(async function(){
  try {
    var res = await fetch(_gymCloudEP, {cache:'no-store'});
    if (res.ok) {
      var txt = await res.text();
      if (txt && txt !== 'null') {
        var blob = JSON.parse(txt);
        for (var k in blob) if (blob.hasOwnProperty(k))
          localStorage.setItem(k, typeof blob[k]==='string' ? blob[k] : JSON.stringify(blob[k]));
      }
    }
  } catch(e) { console.warn('[cloud] load failed, using local', e); }
  _gymCloudReady = true;
  loadData();
  showScreen('home');
})();
</script>
